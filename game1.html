<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청렴 탐정 1 — 그 말, 진짜야?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8f4ff;font-family:'Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}

.top-bar{background:#fff;border-radius:16px;padding:0.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border:1px solid #c0d8f0;box-shadow:0 2px 8px rgba(100,160,220,0.1)}
.game-title{font-size:16px;font-weight:800;color:#1a4a7a;letter-spacing:-0.4px}
.chapter-badge{font-size:12px;color:#4a80b0;background:#ddeeff;border:1px solid #a0c8f0;border-radius:20px;padding:3px 12px;font-weight:600}

#screen{background:#f0f8ff;border-radius:20px;padding:1.25rem;min-height:360px;border:1px solid #c0d8f0;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;overflow:hidden;box-shadow:inset 0 2px 8px rgba(100,160,220,0.08)}

.line{animation:fadeUp 0.22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.narr{font-size:17px;color:#2a4a7a;font-style:italic;font-weight:700;text-align:center;padding:8px 16px;background:rgba(140,190,240,0.22);border-radius:20px;margin:4px 0;word-break:keep-all;line-height:1.65;letter-spacing:-0.2px}

.row{display:flex;align-items:flex-end;gap:8px}
.row.right{flex-direction:row-reverse}
.avatar{width:92px;height:92px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.bubble-wrap{display:flex;flex-direction:column;gap:3px;max-width:74%}
.row.right .bubble-wrap{align-items:flex-end}
.char-name{font-size:14px;font-weight:800;padding:0 4px;letter-spacing:-0.2px}
.bubble{padding:0.65rem 0.95rem;border-radius:14px;font-size:17px;line-height:1.75;word-break:keep-all}

.nm-jaei{color:#1a5a9a}.bbl-jaei{background:#ddeeff;color:#0a3060;border:1px solid #a8c8f0;border-bottom-right-radius:4px}
.nm-taeo{color:#c05000}.bbl-taeo{background:#fff0e0;color:#4a1800;border:1px solid #f0b060;border-bottom-left-radius:4px}
.nm-seoha{color:#1a7a40}.bbl-seoha{background:#e0f5ea;color:#0a3a18;border:1px solid #88d0a0;border-bottom-left-radius:4px}
.nm-joonse{color:#5a5a5a}.bbl-joonse{background:#f4f4f4;color:#2a2a2a;border:1px solid #c0c0c0;border-bottom-left-radius:4px}
.nm-minjae{color:#a02020}.bbl-minjae{background:#fde8e8;color:#6a1010;border:1px solid #f0a8a8;border-bottom-left-radius:4px}
.nm-teacher{color:#5a2a9a}.bbl-teacher{background:#ede8ff;color:#2a1060;border:1px solid #b898e8;border-bottom-left-radius:4px}

#click-area{background:#fff;border:1.5px solid #a8ccee;border-radius:14px;padding:1rem 1.25rem;text-align:center;cursor:pointer;font-size:17px;color:#2a6aa0;font-weight:700;user-select:none;transition:all 0.15s;box-shadow:0 2px 6px rgba(100,160,220,0.12)}
#click-area:hover{background:#ddeeff;border-color:#6aa8d8}
#click-area:active{transform:scale(0.97)}

.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:#fff;border:1.5px solid #a8ccee;border-radius:12px;padding:0.9rem 1.1rem;text-align:left;font-size:17px;color:#1a4a7a;cursor:pointer;line-height:1.55;word-break:keep-all;transition:all 0.15s;font-family:inherit;font-weight:500}
.choice-btn:hover{background:#ddeeff;border-color:#5a98d0}
.choice-label{font-weight:700;color:#2a7ad0;margin-right:6px}

.quiz-wrap{background:#fff;border:1.5px solid #a8ccee;border-radius:16px;padding:1.25rem}
.quiz-tag{font-size:11px;font-weight:700;color:#2a7ad0;margin-bottom:8px;letter-spacing:0.5px;background:#ddeeff;display:inline-block;padding:3px 10px;border-radius:20px}
.quiz-q{font-size:17px;font-weight:800;color:#1a3a6a;margin-bottom:12px;line-height:1.65;word-break:keep-all}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.qbtn{background:#f4f8ff;border:1px solid #b8d4f0;border-radius:10px;padding:0.75rem 1rem;text-align:left;font-size:16px;color:#1a3a6a;cursor:pointer;line-height:1.55;word-break:keep-all;transition:all 0.15s;font-family:inherit}
.qbtn:hover{background:#ddeeff}.qbtn:disabled{cursor:default;opacity:0.7}
.q-correct{background:#e0f5ea;color:#0a4020;border:1px solid #80c898;padding:0.6rem 0.85rem;border-radius:10px;font-size:15px;font-weight:700;margin-top:8px}
.q-wrong{background:#fde8e8;color:#7a1a1a;border:1px solid #f0a0a0;padding:0.6rem 0.85rem;border-radius:10px;font-size:15px;font-weight:700;margin-top:8px}
.cheong-point{background:#e8f4ff;border:1.5px solid #80b8e8;border-radius:10px;padding:0.75rem 1rem;margin-top:8px;font-size:14px;color:#1a4a7a;line-height:1.7;word-break:keep-all}
.cheong-point-label{font-weight:800;color:#185FA5;display:block;margin-bottom:4px}

.char-intro-wrap{background:#fff;border:1.5px solid #a8ccee;border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;gap:10px}
.char-intro-tag{font-size:11px;font-weight:700;color:#2a7ad0;background:#ddeeff;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:4px}
.char-card{display:flex;gap:10px;align-items:flex-start;background:#f4f8ff;border:1px solid #c8dff0;border-radius:12px;padding:0.8rem 1rem}
.char-card-av{width:92px;height:92px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.char-card-info{flex:1}
.char-card-name{font-size:15px;font-weight:800;color:#1a3a6a;margin-bottom:2px}
.char-card-role{font-size:12px;color:#4a80b0;margin-bottom:4px;font-weight:600}
.char-card-desc{font-size:13px;color:#4a6a8a;line-height:1.6;word-break:keep-all}

.interview-wrap{background:#fff;border:1.5px solid #b898e8;border-radius:16px;padding:1.25rem}
.interview-tag{font-size:11px;font-weight:700;color:#5a2a9a;background:#ede8ff;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.interview-desc{font-size:14px;color:#4a3070;margin-bottom:12px;line-height:1.6;word-break:keep-all}
.interview-progress{font-size:14px;font-weight:700;color:#5a2a9a;margin-bottom:10px}
.witness-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.witness-row{display:flex;align-items:center;gap:10px;background:#f8f4ff;border:1px solid #c8b0e8;border-radius:12px;padding:0.75rem 1rem;cursor:pointer;transition:all 0.15s}
.witness-row:hover{background:#ede8ff}
.witness-row.done{opacity:0.6;cursor:default}
.witness-av{width:92px;height:92px;border-radius:50%;overflow:hidden;flex-shrink:0}
.witness-name{font-size:14px;font-weight:700;color:#3a1a7a}
.witness-hint{font-size:12px;color:#8a70b8;margin-top:1px}
.witness-badge{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:700;margin-left:auto;flex-shrink:0}
.badge-new{background:#ede8ff;color:#5a2a9a}
.badge-done{background:#e0f5ea;color:#0a5020}
.interview-box{background:#f8f4ff;border:1px solid #c8b0e8;border-radius:12px;padding:1rem;display:none;margin-bottom:10px}
.interview-q{font-size:14px;font-weight:700;color:#3a1a7a;margin-bottom:8px;word-break:keep-all}
.interview-opts{display:flex;flex-direction:column;gap:6px}
.interview-btn{background:#ede8ff;border:1px solid #c8b0e8;border-radius:8px;padding:0.6rem 0.9rem;text-align:left;font-size:13.5px;color:#2a0a60;cursor:pointer;font-family:inherit;line-height:1.5;word-break:keep-all;transition:all 0.15s}
.interview-btn:hover{background:#d8d0ff}
.interview-result{font-size:13.5px;padding:0.6rem 0.85rem;border-radius:8px;margin-top:8px;line-height:1.6;word-break:keep-all;display:none}
.ir-good{background:#e0f5ea;color:#0a4020;border:1px solid #80c898}
.ir-bad{background:#fff4d8;color:#5a3000;border:1px solid #f0c060}

.score-box{background:#fff;border:1.5px solid #a8ccee;border-radius:14px;padding:1rem 1.25rem;display:flex;align-items:center;gap:16px}
.score-num{font-size:32px;font-weight:700;color:#2a7ad0}
.score-label{font-size:12px;color:#6a90b8}
.score-msg{font-size:15px;font-weight:700;color:#1a4a7a}
.score-sub{font-size:12px;color:#6a90b8;margin-top:2px}

.ending-box{border-radius:16px;padding:1.5rem;border:1.5px solid}
.end-a{background:#e8f8ee;border-color:#80c898}
.end-b{background:#fff8e8;border-color:#f0c060}
.end-c{background:#fde8e8;border-color:#f0a0a0}
.end-title{font-size:18px;font-weight:800;margin-bottom:10px}
.end-a .end-title{color:#0a5a28}
.end-b .end-title{color:#6a4a00}
.end-c .end-title{color:#7a1a1a}
.end-body{font-size:15px;line-height:1.9;color:#2a2a3a;word-break:keep-all;white-space:pre-line}
.lesson{background:#f4f8ff;border-radius:10px;padding:1rem;margin-top:12px;font-size:13px;color:#3a5a8a;line-height:1.7;border:1px solid #c0d8f0;word-break:keep-all}
.lesson-label{font-weight:800;color:#1a4a7a;display:block;margin-bottom:4px}

.cheong-summary{background:#fff;border:1.5px solid #185FA5;border-radius:16px;padding:1.25rem;margin-top:4px}
.cheong-summary-title{font-size:15px;font-weight:800;color:#185FA5;margin-bottom:12px}
.cheong-card{background:#e8f4ff;border:1px solid #b5d4f4;border-radius:10px;padding:0.75rem 1rem;margin-bottom:8px;font-size:13.5px;color:#1a3a6a;line-height:1.7;word-break:keep-all}
.cheong-card-num{font-weight:800;color:#185FA5;margin-right:6px}

.action-btns{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.restart-btn{background:#2a7ad0;border:none;border-radius:12px;padding:0.9rem 1.25rem;font-size:17px;color:#fff;cursor:pointer;width:100%;font-weight:700;font-family:inherit;transition:background 0.15s}
.restart-btn:hover{background:#1a5aa0}
.back-btn{background:#fff;border:1.5px solid #f0c060;border-radius:12px;padding:0.9rem 1.25rem;font-size:16px;color:#6a4a00;cursor:pointer;width:100%;font-weight:700;font-family:inherit;transition:all 0.15s}
.back-btn:hover{background:#fff8e8}
</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="game-title">그 말, 진짜야?</span>
    <span class="chapter-badge" id="chbadge">프롤로그</span>
  </div>
  <div id="screen"></div>
  <div id="click-area" onclick="safeNextLine()">화면을 클릭해서 계속하기 ▶</div>
  <div id="choices-area"></div>
  <div id="mini-area"></div>
</div>

/* ===== DOM ===== */
var screen=document.getElementById('screen');
var clickArea=document.getElementById('click-area');
var choicesArea=document.getElementById('choices-area');
var miniArea=document.getElementById('mini-area');

/* ===== 타이핑 효과 ===== */
function setClickLock(locked){
  isTyping=locked;
  if(!clickArea)return;
  clickArea.style.opacity=locked?'0.55':'1';
  clickArea.style.cursor=locked?'not-allowed':'pointer';
}
function typeText(el,text,speed){
  setClickLock(true);
  var i=0;el.textContent='';
  typingAbort=function(){typingAbort=null;el.textContent=text;setClickLock(false);};
  function step(){
    if(typingAbort===null&&el.textContent===text)return;
    if(i<text.length){el.textContent+=text[i++];screen.scrollTop=screen.scrollHeight;setTimeout(step,speed);}
    else{typingAbort=null;setClickLock(false);}
  }
  step();
}
function safeNextLine(){
  if(typingAbort){typingAbort();return;}
  nextLine();
}

function clearAreas(){
  choicesArea.innerHTML='';miniArea.innerHTML='';
  clickArea.style.display='block';
  clickArea.textContent='화면을 클릭해서 계속하기 ▶';
  clickArea.onclick=safeNextLine;
}
function setChapter(t){document.getElementById('chbadge').textContent=t;}

function addLine(l){
  var el=document.createElement('div');el.className='line';
  if(l.type==='narr'){
    el.className+=' narr';
    var span=document.createElement('span');el.appendChild(span);
    screen.appendChild(el);screen.scrollTop=screen.scrollHeight;
    typeText(span,l.text,85);return;
  } else {
    var c=CHARS[l.char];
    var row=document.createElement('div');row.className='row'+(c.side==='right'?' right':'');
    var av=document.createElement('div');av.className='avatar';av.innerHTML=SVG[l.char];
    var bwrap=document.createElement('div');bwrap.className='bubble-wrap';
    var nm=document.createElement('div');nm.className='char-name nm-'+c.cls;nm.textContent=c.name;
    var bbl=document.createElement('div');bbl.className='bubble bbl-'+c.cls;
    bwrap.appendChild(nm);bwrap.appendChild(bbl);
    row.appendChild(av);row.appendChild(bwrap);el.appendChild(row);
  }
  screen.appendChild(el);screen.scrollTop=screen.scrollHeight;
  typeText(bbl,'"'+l.text+'"',85);
}

function loadScene(id){
  currentScene=SCENES[id];lineIdx=0;
  clearAreas();setChapter(currentScene.chapter);nextLine();
}
function nextLine(){
  if(lineIdx<currentScene.lines.length){addLine(currentScene.lines[lineIdx]);lineIdx++;}
  else resolveNext(currentScene.next);
}
function resolveNext(next){
  if(!next)return;
  if(next.type==='scene')loadScene(next.id);
  else if(next.type==='quiz')showQuiz(next.id);
  else if(next.type==='choice')showChoices(next.id);
  else if(next.type==='mini')showMini(next.id);
  else if(next.type==='ending')showEnding(next.id);
  else if(next.type==='intro-chars')showCharIntro();
}

function restart(){
  score=0;interviewDone=0;collectedPoints=[];lastChoiceScene=null;
  screen.innerHTML='';clearAreas();loadScene('intro');
}

loadScene('intro');
