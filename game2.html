<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청렴 탐정 2 — 학교의 비밀</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8f4ff;font-family:'Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}

.top-bar{background:#fff;border-radius:16px;padding:0.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border:1px solid #c0d8f0;box-shadow:0 2px 8px rgba(100,160,220,0.1)}
.game-title{font-size:18px;font-weight:800;color:#1a4a7a;letter-spacing:-0.4px}
.chapter-badge{font-size:12px;color:#4a80b0;background:#ddeeff;border:1px solid #a0c8f0;border-radius:20px;padding:3px 12px;font-weight:600}

#screen{background:#f0f8ff;border-radius:20px;padding:1.25rem;min-height:360px;border:1px solid #c0d8f0;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;overflow:hidden;box-shadow:inset 0 2px 8px rgba(100,160,220,0.08)}

.line{animation:fadeUp 0.22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.narr{font-size:17px;color:#2a4a7a;font-style:italic;font-weight:700;text-align:center;padding:8px 16px;background:rgba(140,190,240,0.22);border-radius:20px;margin:4px 0;word-break:keep-all;line-height:1.65;letter-spacing:-0.2px}

.row{display:flex;align-items:flex-end;gap:8px}
.row.right{flex-direction:row-reverse}
.avatar{width:92px;height:92px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.bubble-wrap{display:flex;flex-direction:column;gap:3px;max-width:74%}
.row.right .bubble-wrap{align-items:flex-end}
.char-name{font-size:14px;font-weight:800;padding:0 4px;letter-spacing:-0.2px}
.bubble{padding:0.65rem 0.95rem;border-radius:14px;font-size:17px;line-height:1.75;word-break:keep-all}

.nm-jaei{color:#1a5a9a}.bbl-jaei{background:#ddeeff;color:#0a3060;border:1px solid #a8c8f0;border-bottom-right-radius:4px}
.nm-minhyuk{color:#a02020}.bbl-minhyuk{background:#fde8e8;color:#6a1010;border:1px solid #f0a8a8;border-bottom-left-radius:4px}
.nm-sujin{color:#1a7a40}.bbl-sujin{background:#e0f5ea;color:#0a3a18;border:1px solid #88d0a0;border-bottom-left-radius:4px}
.nm-teacherbad{color:#8a5a00}.bbl-teacherbad{background:#fff4d8;color:#4a2800;border:1px solid #f0c060;border-bottom-left-radius:4px}
.nm-teachergood{color:#5a2a9a}.bbl-teachergood{background:#ede8ff;color:#2a1060;border:1px solid #b898e8;border-bottom-left-radius:4px}
.nm-tayang{color:#4a2a8a}.bbl-tayang{background:#e8e0ff;color:#280a60;border:1px solid #b088e0;border-bottom-left-radius:4px}
.nm-minjun{color:#7a4a00}.bbl-minjun{background:#fff0d8;color:#5a2800;border:1px solid #e0a840;border-bottom-left-radius:4px}
.nm-principal{color:#3a3a8a}.bbl-principal{background:#e8e8ff;color:#1a1a60;border:1px solid #a8a8e0;border-bottom-left-radius:4px}

#click-area{background:#fff;border:1.5px solid #a8ccee;border-radius:14px;padding:1rem 1.25rem;text-align:center;cursor:pointer;font-size:17px;color:#2a6aa0;font-weight:700;user-select:none;transition:all 0.15s;box-shadow:0 2px 6px rgba(100,160,220,0.12)}
#click-area:hover{background:#ddeeff;border-color:#6aa8d8}
#click-area:active{transform:scale(0.97)}

.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:#fff;border:1.5px solid #a8ccee;border-radius:12px;padding:0.9rem 1.1rem;text-align:left;font-size:17px;color:#1a4a7a;cursor:pointer;line-height:1.55;word-break:keep-all;transition:all 0.15s;font-family:inherit;font-weight:500}
.choice-btn:hover{background:#ddeeff;border-color:#5a98d0}
.choice-label{font-weight:700;color:#2a7ad0;margin-right:6px}

.quiz-wrap{background:#fff;border:1.5px solid #a8ccee;border-radius:16px;padding:1.25rem}
.quiz-tag{font-size:11px;font-weight:700;color:#2a7ad0;margin-bottom:8px;letter-spacing:0.5px;background:#ddeeff;display:inline-block;padding:3px 10px;border-radius:20px}
.quiz-q{font-size:17px;font-weight:800;color:#1a3a6a;margin-bottom:12px;line-height:1.65;word-break:keep-all}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.qbtn{background:#f4f8ff;border:1px solid #b8d4f0;border-radius:10px;padding:0.75rem 1rem;text-align:left;font-size:16px;color:#1a3a6a;cursor:pointer;line-height:1.55;word-break:keep-all;transition:all 0.15s;font-family:inherit}
.qbtn:hover{background:#ddeeff}.qbtn:disabled{cursor:default;opacity:0.7}
.q-correct{background:#e0f5ea;color:#0a4020;border:1px solid #80c898;padding:0.6rem 0.85rem;border-radius:10px;font-size:13px;font-weight:600;margin-top:8px}
.q-wrong{background:#fde8e8;color:#7a1a1a;border:1px solid #f0a0a0;padding:0.6rem 0.85rem;border-radius:10px;font-size:13px;font-weight:600;margin-top:8px}

.char-intro-wrap{background:#fff;border:1.5px solid #a8ccee;border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;gap:10px}
.char-intro-tag{font-size:11px;font-weight:700;color:#2a7ad0;background:#ddeeff;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:4px}
.char-card{display:flex;gap:10px;align-items:flex-start;background:#f4f8ff;border:1px solid #c8dff0;border-radius:12px;padding:0.8rem 1rem}
.char-card-av{width:92px;height:92px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.char-card-info{flex:1}
.char-card-name{font-size:13px;font-weight:700;color:#1a3a6a;margin-bottom:2px}
.char-card-role{font-size:11px;color:#4a80b0;margin-bottom:4px;font-weight:600}
.char-card-desc{font-size:12px;color:#4a6a8a;line-height:1.6;word-break:keep-all}

.evidence-wrap{background:#fff;border:1.5px solid #f0c060;border-radius:16px;padding:1.25rem}
.ev-tag{font-size:11px;font-weight:700;color:#8a5a00;background:#fff4d8;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.ev-desc{font-size:13px;color:#6a5020;margin-bottom:12px;line-height:1.6;word-break:keep-all}
.ev-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.ev-card{background:#fffbf0;border:1.5px solid #f0d080;border-radius:12px;padding:0.75rem 0.5rem;text-align:center;cursor:pointer;font-size:12px;color:#6a4a10;line-height:1.4;transition:all 0.15s;word-break:keep-all}
.ev-card:hover{background:#fff4d8}
.ev-card.found{background:#e0f5ea;border-color:#80c898;color:#0a4020;cursor:default}
.ev-card.fake{background:#fde8e8;border-color:#f0a0a0;color:#7a1a1a}
.ev-icon{font-size:24px;display:block;margin-bottom:4px}
.ev-msg{font-size:13px;padding:0.6rem 0.85rem;border-radius:10px;font-weight:600;display:none;margin-top:4px}
.ev-ok{background:#e0f5ea;color:#0a4020;border:1px solid #80c898}
.ev-ng{background:#fde8e8;color:#7a1a1a;border:1px solid #f0a0a0}

.stmt-wrap{background:#fff;border:1.5px solid #b898e8;border-radius:16px;padding:1.25rem}
.stmt-tag{font-size:11px;font-weight:700;color:#5a2a9a;background:#ede8ff;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.stmt-desc{font-size:13px;color:#4a3070;margin-bottom:12px;line-height:1.6;word-break:keep-all}
.stmt-card{background:#f8f4ff;border:1px solid #c8b0e8;border-radius:12px;padding:0.85rem 1rem;margin-bottom:8px}
.stmt-who{font-size:11px;font-weight:700;color:#5a2a9a;margin-bottom:5px}
.stmt-text{font-size:13px;color:#2a1060;line-height:1.65;word-break:keep-all}
.stmt-btns{display:flex;gap:7px;margin-top:8px;align-items:center}
.stmt-btn{font-size:12px;padding:5px 14px;border-radius:8px;cursor:pointer;border:1px solid #c8b0e8;background:#ede8ff;color:#3a1a7a;font-family:inherit;font-weight:600;transition:all 0.15s}
.stmt-btn:hover{background:#d8d0ff}
.stmt-badge{font-size:11px;padding:3px 8px;border-radius:8px;margin-left:6px;font-weight:700}
.badge-lie{background:#fde8e8;color:#7a1a1a}
.badge-truth{background:#e0f5ea;color:#0a4020}
.badge-unk{background:#f0f0f0;color:#888}
.stmt-fb{display:none;font-size:12px;color:#6a50a8;margin-top:6px;line-height:1.55;word-break:keep-all}

.score-box{background:#fff;border:1.5px solid #a8ccee;border-radius:14px;padding:1rem 1.25rem;display:flex;align-items:center;gap:16px}
.score-num{font-size:32px;font-weight:700;color:#2a7ad0}
.score-label{font-size:12px;color:#6a90b8}
.score-msg{font-size:14px;font-weight:700;color:#1a4a7a}
.score-sub{font-size:12px;color:#6a90b8;margin-top:2px}

.ending-box{border-radius:16px;padding:1.5rem;border:1.5px solid}
.end-a{background:#e8f8ee;border-color:#80c898}
.end-b{background:#fff8e8;border-color:#f0c060}
.end-c{background:#fde8e8;border-color:#f0a0a0}
.end-title{font-size:18px;font-weight:700;margin-bottom:10px}
.end-a .end-title{color:#0a5a28}
.end-b .end-title{color:#6a4a00}
.end-c .end-title{color:#7a1a1a}
.end-body{font-size:13.5px;line-height:1.9;color:#2a2a3a;word-break:keep-all;white-space:pre-line}
.lesson{background:#f4f8ff;border-radius:10px;padding:1rem;margin-top:12px;font-size:13px;color:#3a5a8a;line-height:1.7;border:1px solid #c0d8f0;word-break:keep-all}
.lesson-label{font-weight:700;color:#1a4a7a;display:block;margin-bottom:4px}

.restart-btn{background:#2a7ad0;border:none;border-radius:12px;padding:0.9rem 1.25rem;font-size:14px;color:#fff;cursor:pointer;width:100%;font-weight:700;font-family:inherit;transition:background 0.15s;margin-top:4px}
.restart-btn:hover{background:#1a5aa0}

.cheong-summary{background:#fff;border:1.5px solid #185FA5;border-radius:16px;padding:1.25rem;margin-top:4px}
.cheong-summary-title{font-size:15px;font-weight:800;color:#185FA5;margin-bottom:12px}
.cheong-card{background:#e8f4ff;border:1px solid #b5d4f4;border-radius:10px;padding:0.75rem 1rem;margin-bottom:8px;font-size:14px;color:#1a3a6a;line-height:1.7;word-break:keep-all}
.cheong-card-num{font-weight:800;color:#185FA5;margin-right:6px}
.cheong-point{background:#e8f4ff;border:1.5px solid #80b8e8;border-radius:10px;padding:0.75rem 1rem;margin-top:8px;font-size:14px;color:#1a4a7a;line-height:1.7;word-break:keep-all}
.cheong-point-label{font-weight:800;color:#185FA5;display:block;margin-bottom:4px}
.action-btns{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.back-btn{background:#fff;border:1.5px solid #f0c060;border-radius:12px;padding:0.9rem 1.25rem;font-size:16px;color:#6a4a00;cursor:pointer;width:100%;font-weight:700;font-family:inherit;transition:all 0.15s}
.back-btn:hover{background:#fff8e8}

</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="game-title">청렴 탐정 2 — 학교의 비밀</span>
    <span class="chapter-badge" id="chbadge">프롤로그</span>
  </div>
  <div id="screen"></div>
  <div id="click-area" onclick="safeNextLine()">화면을 클릭해서 계속하기 ▶</div>
  <div id="choices-area"></div>
  <div id="mini-area"></div>
</div>

    lines:[
      {type:'narr',text:'개학 후 첫 번째 금요일. 점심시간이 끝나갈 무렵, 수진이가 급하게 달려온다. 얼굴이 창백하다.'},

      {type:'char',char:'jaei',text:'수진아, 일단 선생님께 가기 전에 우리가 더 확인해보자. 민준문구가 어떤 곳인지부터 알아봐.'},
      {type:'char',char:'sujin',text:'나도 찾아봤어. 민준문구… 대표 강민준. 민혁이 사촌 형이야. 27살.'},
      {type:'char',char:'jaei',text:'사촌 형 가게에서 세 배 가격에 물건을 샀다고?'},
      {type:'char',char:'sujin',text:'응. 그리고 내가 캡처해뒀어. 이게 실제 같은 A4용지 온라인 최저가.'},
      {type:'narr',text:'수진이가 핸드폰을 보여준다. 6천 원짜리 A4용지가 영수증에는 6만 원으로 적혀 있다.'},
      {type:'char',char:'jaei',text:'한 박스에 6천 원짜리를 6만 원으로... 세 장이면 차액만 16만 원 넘는다. 이게 세 번이면 총 50만 원 가까이 되겠다.'},
      {type:'char',char:'sujin',text:'정확해. 근데 어떻게 증명하지?'},
      {type:'narr',text:'그때 학생회실 문이 열린다. 학생회 총무 오태양이 들어오다 너희를 보고 멈춘다.'},
      {type:'char',char:'tayang',text:'…너네 여기서 뭐 해?'},
    ],
    next:{type:'quiz',id:'q2b'}
  },

  ch3:{chapter:'3장 — 오태양의 비밀',
    lines:[
      {type:'narr',text:'태양이의 눈이 흔들린다. 뭔가를 아는 표정이다.'},
      {type:'char',char:'tayang',text:'너네 여기서 뭐 해? 학생회실은 학생회 임원만 들어올 수 있는 거 알잖아.'},
      {type:'char',char:'jaei',text:'우리 잠깐 파일 좀 보려고. 태양아, 너 민준문구 알아?'},
      {type:'char',char:'tayang',text:'민준문구? 몰라. 왜?'},
      {type:'narr',text:'너무 빠른 대답이다. 눈도 마주치지 않는다.'},
      {type:'char',char:'sujin',text:'태양아, 학생회 영수증에 민준문구가 계속 나와. 네가 총무니까 구매 과정 알지 않아?'},
      {type:'char',char:'tayang',text:'나는 구매는 민혁이가 다 했어. 나는 몰라.'},
      {type:'char',char:'jaei',text:'근데 태양아, 이 영수증 날짜 봐. 7월 30일이야. 방학 중에 학교 행사용 물건을 샀다고? 학교 행사는 6월에 다 끝났잖아.'},
      {type:'narr',text:'태양이가 입술을 깨문다. 시선이 흔들린다.'},
      {type:'char',char:'tayang',text:'그건… 민혁이한테 물어봐.'},
      {type:'char',char:'jaei',text:'태양아. 나 기자야. 사람 표정 읽는 건 자신 있어. 너 지금 알면서 모른다고 하는 거잖아.'},
      {type:'char',char:'tayang',text:'…관계없어. 나는 아무것도 몰라.'},
      {type:'char',char:'sujin',text:'태양아, 우리 지금 진짜로 이상한 걸 발견했어. 학생회 예산 50만 원이 허위 영수증으로 새나간 것 같아. 이거 우리만의 문제가 아니야. 전교생 돈이야.'},
      {type:'narr',text:'태양이가 한동안 아무 말도 하지 않는다. 손이 살짝 떨린다.'},
      {type:'char',char:'tayang',text:'…만약 내가 아는 게 있다고 해도, 말하면 나도 엮여. 민혁이가 그랬어. 나도 알고 있었으니까 공범이라고.'},
      {type:'char',char:'jaei',text:'잠깐, 그럼 너 알고 있었던 거야?'},
      {type:'narr',text:'태양이가 고개를 떨군다. 긴 침묵.'},
      {type:'char',char:'tayang',text:'…민혁이가 2학기 시작 전에 나한테 말했어. 집안 사정이 어려워졌다고. 사촌 형 가게에서 학교 물건 사고 차액을 받기로 했다고. 나는 말렸어. 근데 민혁이가 "이미 말했으니까 너도 아는 거야. 말하면 너도 끝"이라고 했어.'},
      {type:'char',char:'sujin',text:'그래서 계속 침묵하고 있었던 거야?'},
      {type:'char',char:'tayang',text:'…미안. 무서웠어. 민혁이가 학교에서 얼마나 영향력 있는지 알잖아.'},
      {type:'char',char:'jaei',text:'태양아, 그건 협박이야. 그리고 넌 피해자야. 공익신고자는 법으로 보호받아. 네가 직접 가담한 게 아니면 괜찮아.'},
      {type:'char',char:'tayang',text:'…정말? 나도 신고해도 돼?'},
      {type:'char',char:'jaei',text:'응. 오히려 용기 내서 말해주면 큰 도움이 돼.'},
      {type:'narr',text:'태양이가 천천히 고개를 든다.'},
      {type:'char',char:'tayang',text:'…알겠어. 내가 아는 거 다 말할게.'},
    ],
    next:{type:'quiz',id:'q3'}
  },

  ch4:{chapter:'4장 — 증거를 찾아라',
    lines:[
      {type:'narr',text:'세 사람은 학생회실에서 증거를 더 찾기로 한다. 민혁이가 장부를 가져갔지만, 보조 파일과 영수증 사본이 남아 있을 수 있다.'},
      {type:'char',char:'sujin',text:'내가 회계 담당이라 보조 장부는 따로 정리해뒀어. 근데 영수증 원본은 없어.'},
      {type:'char',char:'tayang',text:'학생회실 책장 제일 위칸에 지난 학기 파일들이 있어. 민혁이가 거기 뭔가 넣는 걸 봤어.'},
      {type:'char',char:'jaei',text:'좋아. 진짜 증거를 찾아보자. 하지만 함부로 건드리면 나중에 우리가 문제가 될 수 있으니 조심해야 해.'},
    ],
    next:{type:'mini',id:'evidence'}
  },

  ch5:{chapter:'5장 — 민혁의 반격',
    lines:[
      {type:'narr',text:'다음날 아침. 민혁이가 너를 복도 끝으로 불러낸다. 뒤에는 친구 둘이 서 있다.'},
      {type:'char',char:'minhyuk',text:'이재이. 어제 학생회실에서 뭘 뒤졌어?'},
      {type:'char',char:'jaei',text:'학생회실은 학생 누구나 들어갈 수 있잖아.'},
      {type:'char',char:'minhyuk',text:'신문부라고 뭐든 취재 대상이 된다고 생각하는 거야? 내가 학교에서 얼마나 영향력이 있는지 알잖아. 신문부 폐부 요청도 할 수 있어.'},
      {type:'char',char:'jaei',text:'그게 지금 협박이야?'},
      {type:'char',char:'minhyuk',text:'사실을 말하는 거야. 괜한 짓 하지 마.'},
      {type:'narr',text:'민혁이가 자리를 뜬다. 심장이 빠르게 뛰지만, 손에 쥔 증거 사진이 생각난다.'},
      {type:'narr',text:'같은 시각, 수진이에게도 민혁이가 접근했다.'},
      {type:'char',char:'minhyuk',text:'수진아, 솔직히 말할게. 내가 좀 힘든 상황이야. 집안 사정이 있어서. 그냥 모른 척해줄 수 없어? 나중에 꼭 갚을게.'},
      {type:'char',char:'sujin',text:'민혁아, 그건 내가 결정할 수 있는 게 아니야. 공금이잖아.'},
      {type:'char',char:'minhyuk',text:'그래? 그럼 이렇게 해. 수진이 너, 1학년 때 윤준서 담배 소문 기억해?'},
      {type:'char',char:'sujin',text:'…그게 왜?'},
      {type:'char',char:'minhyuk',text:'그 소문 네가 시작한 거잖아. 준서가 편의점 뒤에서 아이스크림 먹는 걸 보고 "담배 피우나 했더니"라고 떠들고 다닌 거. 그게 퍼진 거잖아.'},
      {type:'char',char:'sujin',text:'그건… 그건 장난으로 한 말이었어. 내가 일부러 소문 낸 게 아니야.'},
      {type:'char',char:'minhyuk',text:'근데 결과적으로 네 말에서 시작된 거잖아. 준서가 그거 때문에 얼마나 힘들었는지 알아? 소문 시작이 너라는 거 학교에 알리면… 어떻게 될 것 같아?'},
      {type:'narr',text:'수진이의 얼굴이 하얗게 질린다. 1학년 때부터 마음에 걸렸던 일이었다. 준서에게 사과하지 못한 채 2학년이 됐는데, 그게 이렇게 돌아올 줄은 몰랐다.'},
      {type:'char',char:'sujin',text:'…그러니까 조용히 있으라는 거야?'},
      {type:'char',char:'minhyuk',text:'영리하네. 그래.'},
      {type:'narr',text:'수진이가 떨리는 손으로 재이에게 전화한다.'},
      {type:'char',char:'sujin',text:'재이야, 민혁이가 나한테 협박했어. 1학년 때 준서 소문… 그게 나한테서 시작된 거라고. 나도 몰랐어, 그게 그렇게 퍼질 줄은. 근데 민혁이가 그걸 빌미로 조용히 있으라고 해.'},
      {type:'narr',text:'재이는 잠시 말이 없었다. 준서 소문. 1학년 때 그 일이 수진이에서 시작된 거였구나.'},
      {type:'char',char:'jaei',text:'수진아, 일단 진정해. 네가 일부러 한 게 아니라는 거 알아. 근데 지금 중요한 건 민혁이가 그걸 협박에 이용하고 있다는 거야. 그건 명백히 잘못된 거야.'},
      {type:'char',char:'sujin',text:'근데 나도 준서한테 미안한 건 사실이잖아…'},
      {type:'char',char:'jaei',text:'그건 나중에 준서한테 직접 사과하면 돼. 지금 이 상황에서 침묵하면 민혁이 잘못은 계속되는 거야. 협박 내용 캡처해둬. 그게 증거가 돼.'},
    ],
    next:{type:'quiz',id:'q4'}
  },

  ch6a:{chapter:'6장 — 학생부 선생님',
    lines:[
      {type:'narr',text:'방과 후, 재이·수진·태양 세 사람이 학생부 김지연 선생님을 찾아간다.'},
      {type:'char',char:'teachergood',text:'어서 와요. 무슨 일이에요?'},
      {type:'narr',text:'너는 지금까지 모은 것들을 모두 꺼낸다. 온라인 가격 캡처, 영수증 사본 사진, 민준문구 대표 정보, 그리고 협박 내용까지.'},
      {type:'char',char:'teachergood',text:'(꼼꼼히 살펴보며) 이건… 단순한 실수가 아니네요. 허위 영수증 작성에 공금 유용, 그리고 신고자 협박까지.'},
      {type:'char',char:'tayang',text:'선생님, 저도 말씀드릴 게 있어요. 저는 이 사실을 미리 알고 있었는데 말하지 않았어요. 죄송합니다.'},
      {type:'char',char:'teachergood',text:'태양이가 용기 내서 말해줬어요. 세 사람 모두 잘 왔어요. 이제 학교 차원의 공식 조사가 필요한 상황이에요.'},
      {type:'char',char:'jaei',text:'혹시 저희가 신고했다는 게 알려질까요?'},
      {type:'char',char:'teachergood',text:'공익신고자 보호 규정이 있어요. 신고자 신원은 보호받을 수 있어요. 걱정하지 말고 제게 맡겨요.'},
    ],
    next:{type:'scene',id:'ch7'}
  },

  ch6b:{chapter:'6장 — 익명 제보',
    lines:[
      {type:'narr',text:'너는 학교 홈페이지 익명 신고함에 접속한다. 증거 사진과 함께 자세한 내용을 입력한다.'},
      {type:'char',char:'jaei',text:'(혼자 생각하며) 직접 나서면 표적이 될 수 있어. 일단 익명으로 알리자.'},
      {type:'narr',text:'사흘 뒤. 학교 홈페이지에 공지사항이 올라온다.'},
      {type:'narr',text:'"학생회 2학기 예산 집행에 관한 내부 감사를 실시합니다."'},
      {type:'char',char:'sujin',text:'효과가 있었어! 감사가 시작됐어.'},
      {type:'char',char:'tayang',text:'근데 민혁이가 누가 신고했는지 찾고 있대. 나한테도 아냐고 물어봤어.'},
      {type:'char',char:'jaei',text:'증인이 없으면 감사가 흐지부지될 수 있어. 우리가 직접 나서야 할 것 같아.'},
    ],
    next:{type:'choice',id:'choice6b'}
  },

  ch7:{chapter:'7장 — 진술 대결',
    lines:[
      {type:'narr',text:'학교 감사위원회가 꾸려졌다. 교감 선생님과 외부 감사관이 투입됐다. 관련자들의 진술이 수집된다.'},
      {type:'char',char:'jaei',text:'각자 무슨 말을 했는지 분석해보자. 누가 진실을 말하고, 누가 거짓말을 하는지.'},
      {type:'char',char:'sujin',text:'민혁이는 뭐라고 했을까?'},
    ],
    next:{type:'mini',id:'stmt'}
  },

  ch8:{chapter:'8장 — 민준문구의 실체',
    lines:[
      {type:'narr',text:'감사 과정에서 민준문구에 대한 현장 확인이 이루어진다. 감사관이 직접 방문한 결과가 나왔다.'},
      {type:'char',char:'teachergood',text:'민준문구를 확인했어요. 실제로 A4용지 한 박스 소비자가는 6천 원이에요. 영수증에는 6만 원으로 적혀 있었고요.'},
      {type:'char',char:'jaei',text:'세 장 모두 그런 식이었던 거죠?'},
      {type:'char',char:'teachergood',text:'네. 총 허위 청구액이 49만 원이에요. 실제 구매액 1만 8천 원에 허위로 부풀린 거예요. 강민준 씨, 즉 민혁이 사촌 형도 조사를 받게 됩니다.'},
      {type:'narr',text:'민혁이는 결국 감사관 앞에서 모든 것을 인정했다.'},
      {type:'char',char:'minhyuk',text:'…죄송합니다. 제가 잘못했어요. 집안 사정이 어려워지면서 사촌 형이 제안했는데, 거절했어야 했는데. 이런 방법으로 해결하려 한 게 잘못이었어요.'},
      {type:'char',char:'teachergood',text:'민혁아, 힘든 상황이었다는 건 이해해. 하지만 그게 공금을 유용하는 이유가 될 수는 없어. 어려우면 학교 상담실이나 선생님께 먼저 도움을 요청했어야 해.'},
      {type:'narr',text:'박성태 선생님도 감사위원회에 불려갔다.'},
      {type:'char',char:'teacherbad',text:'…민혁이 아버지가 저와 친분이 있어요. 좀 눈감아 달라는 부탁을 받았어요. 그게 잘못인 줄 알았지만 거절하지 못했습니다.'},
    ],
    next:{type:'scene',id:'ch9'}
  },

  ch9:{chapter:'9장 — 파장',
    lines:[
      {type:'narr',text:'사건은 생각보다 크게 번졌다.'},
      {type:'char',char:'teachergood',text:'강민준 씨는 허위 영수증 작성 혐의로 경찰에 신고됐어요. 민준문구는 학교와의 거래 계약이 즉시 해지됩니다.'},
      {type:'char',char:'principal',text:'이번 사안은 매우 심각합니다. 민혁이는 학생회 총무부 부장직을 내려놓고, 학교 징계 처분을 받게 됩니다. 박 선생님도 담임직을 교체하겠습니다.'},
      {type:'char',char:'jaei',text:'교장 선생님, 앞으로 이런 일을 막으려면 어떻게 해야 할까요?'},

/* ===== DOM ===== */
var screen=document.getElementById('screen');
var clickArea=document.getElementById('click-area');
var choicesArea=document.getElementById('choices-area');
var miniArea=document.getElementById('mini-area');

function clearAreas(){
  choicesArea.innerHTML='';
  miniArea.innerHTML='';
  clickArea.style.display='block';
  clickArea.textContent='화면을 클릭해서 계속하기 ▶';
  clickArea.onclick=safeNextLine;
}

function setChapter(t){document.getElementById('chbadge').textContent=t;}

/* ===== 타이핑 효과 & 광클 방지 ===== */
var isTyping=false;
var typingAbort=null;

function setClickLock(locked){
  isTyping=locked;
  var btn=document.getElementById('click-area');
  if(!btn)return;
  if(locked){
    btn.style.opacity='0.55';
    btn.style.cursor='not-allowed';
  } else {
    btn.style.opacity='1';
    btn.style.cursor='pointer';
  }
}

function typeText(el,text,speed){
  setClickLock(true);
  var i=0;
  el.textContent='';
  typingAbort=function(){
    typingAbort=null;
    el.textContent=text;
    setClickLock(false);
  };
  function step(){
    if(typingAbort===null && el.textContent===text)return;
    if(i<text.length){
      el.textContent+=text[i++];
      screen.scrollTop=screen.scrollHeight;
      setTimeout(step,speed);
    } else {
      typingAbort=null;
      setClickLock(false);
    }
  }
  step();
}

function safeNextLine(){
  if(typingAbort){typingAbort();return;}
  nextLine();
}

function addLine(l){
  var el=document.createElement('div');
  el.className='line';
  if(l.type==='narr'){
    el.className+=' narr';
    var span=document.createElement('span');
    el.appendChild(span);
    screen.appendChild(el);
    screen.scrollTop=screen.scrollHeight;
    typeText(span,l.text,85);
    return;
  } else {
    var c=CHARS[l.char];
    var isRight=c.side==='right';
    var row=document.createElement('div');
    row.className='row'+(isRight?' right':'');
    var av=document.createElement('div');
    av.className='avatar';
    av.innerHTML=SVG[l.char];
    var bwrap=document.createElement('div');
    bwrap.className='bubble-wrap';
    var nm=document.createElement('div');
    nm.className='char-name nm-'+c.cls;
    nm.textContent=c.name;
    var bbl=document.createElement('div');
    bbl.className='bubble bbl-'+c.cls;
    bwrap.appendChild(nm);
    bwrap.appendChild(bbl);
    row.appendChild(av);
    row.appendChild(bwrap);
    el.appendChild(row);
  }
  screen.appendChild(el);
  screen.scrollTop=screen.scrollHeight;
  typeText(bbl,'"'+l.text+'"',85);
}

/* ===== 장면 진행 ===== */
function loadScene(id){
  currentScene=SCENES[id];
  lineIdx=0;
  clearAreas();
  setChapter(currentScene.chapter);
  nextLine();
}

function nextLine(){
  if(lineIdx<currentScene.lines.length){
    addLine(currentScene.lines[lineIdx]);
    lineIdx++;
  } else {
    resolveNext(currentScene.next);
  }
}

function resolveNext(next){
  if(!next)return;
  if(next.type==='scene') loadScene(next.id);
  else if(next.type==='quiz') showQuiz(next.id);
  else if(next.type==='choice') showChoices(next.id);
  else if(next.type==='mini') showMini(next.id);
  else if(next.type==='ending') showEnding(next.id);
  else if(next.type==='intro-chars') showCharIntro();
}

    c:{

      body:'너는 결국 아무 행동도 하지 않았다. 민혁이의 협박이 무서웠고, 수진이가 피해를 입을까 봐 걱정됐다.\n\n학생회 비리는 계속됐다. 2학기 축제는 예산 부족으로 볼품없이 끝났다. 학생들은 이유도 모른 채 실망했고, 누군가는 "학생회가 왜 이 모양이냐"고 불만을 터뜨렸다.\n\n수진이가 나중에 말했다. "우리가 침묵한 것도 그 비리의 일부가 된 것 같아. 그 생각이 오랫동안 머릿속에 남았어."\n\n부정을 알고도 침묵하는 것은 소극적 동조다. 두렵더라도, 혼자라도, 올바른 방법으로 목소리를 내는 것이 공동체를 지킨다.',
      lesson:'부정을 알고도 침묵하는 것은 소극적 동조입니다. 두렵더라도 올바른 방법으로 목소리를 내는 것이 공동체를 지킵니다. 공익신고자는 법으로 보호받습니다. 엔딩 A에 도전해보세요!'
    }
  };
  var e=endings[id];
  var box=document.createElement('div');box.className='ending-box '+e.cls;
  var title=document.createElement('div');title.className='end-title';title.textContent=e.title;
  var body=document.createElement('div');body.className='end-body';body.textContent=e.body;
  var lesson=document.createElement('div');lesson.className='lesson';
  lesson.innerHTML='<span class="lesson-label">청렴 포인트</span>'+e.lesson;
  box.appendChild(title);box.appendChild(body);box.appendChild(lesson);
  // 청렴 포인트 모음 카드
  var cpSummary=document.createElement('div');cpSummary.className='cheong-summary';
  var cpTitle=document.createElement('div');cpTitle.className='cheong-summary-title';cpTitle.textContent='📋 이번 게임의 청렴 포인트';
  cpSummary.appendChild(cpTitle);
  CHEONG_POINTS.forEach(function(pt,i){
    var card=document.createElement('div');card.className='cheong-card';

    cpSummary.appendChild(card);
  });
  var actionBtns=document.createElement('div');actionBtns.className='action-btns';
  if(id!=='a'){
    var backBtn=document.createElement('button');backBtn.className='back-btn';
    backBtn.textContent='↩ 이전 선택지로 돌아가기';
    backBtn.onclick=function(){
      screen.innerHTML='';miniArea.innerHTML='';choicesArea.innerHTML='';
      clearAreas();
      var backId=BACK_CHOICE[id]||null;
      if(backId)showChoices(backId);
    };
    actionBtns.appendChild(backBtn);
  }
  var btn=document.createElement('button');btn.className='restart-btn';btn.textContent='처음부터 다시 하기';
  btn.onclick=restart;
  actionBtns.appendChild(btn);
  miniArea.appendChild(scoreBox);
  miniArea.appendChild(box);
  miniArea.appendChild(cpSummary);
  miniArea.appendChild(actionBtns);
}
