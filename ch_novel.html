<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>마지막 블록 — 청렴교육</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:#faf9f7;color:#1a1a1a;}
body{font-family:'Noto Serif KR',Georgia,serif;font-weight:300;}

#pbar-wrap{position:fixed;top:0;left:0;width:100%;height:3px;background:#e8e6e0;z-index:100;}
#pbar{height:100%;width:0;background:#7a7a7a;transition:width .5s ease;}

#indicator{position:fixed;top:12px;right:16px;font-size:11px;color:#999;letter-spacing:.1em;z-index:100;}

#content{max-width:640px;width:100%;margin:0 auto;padding:3.5rem 1.75rem 8rem;min-height:100vh;}

#nav-wrap{position:fixed;bottom:0;left:0;right:0;padding:20px 24px 28px;background:linear-gradient(transparent,#faf9f7 45%);display:flex;justify-content:center;gap:12px;}

.btn{padding:11px 30px;border:.5px solid #bbb;background:#fff;color:#444;font-family:inherit;font-size:14px;cursor:pointer;letter-spacing:.05em;border-radius:2px;transition:all .2s;font-weight:300;}
.btn:hover:not(:disabled){background:#f0ede8;border-color:#888;}
.btn:disabled{opacity:.3;cursor:default;}
.btn-dark{background:#1a1a1a;color:#faf9f7;border-color:#1a1a1a;}
.btn-dark:hover:not(:disabled){background:#333;border-color:#333;}

/* Cover */
.cover{text-align:center;padding:5rem 0 3rem;}
.cover-src{font-size:12px;color:#888;line-height:1.9;margin-bottom:3rem;}
.cover-title{font-size:30px;font-weight:500;letter-spacing:.1em;margin-bottom:.5rem;}
.cover-deco{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:2.5rem;}
.cover-deco-line{width:40px;height:.5px;background:#ccc;display:inline-block;}
.cover-deco-text{font-style:normal;font-size:12px;color:#888;letter-spacing:.2em;}
.cover-guide{font-size:13px;color:#777;line-height:2;margin-bottom:3rem;border:.5px solid #e8e6e0;padding:1.25rem 1.5rem;border-radius:2px;text-align:left;}
.cover-guide b{font-weight:400;color:#444;}

/* Story */
.story-p{font-size:16px;line-height:2.05;margin-bottom:1.25em;word-break:keep-all;}
.story-p.dialogue{color:#3a3a3a;padding-left:1em;border-left:2px solid #e0ddd6;margin-left:.5em;}
.story-p.thought{font-style:italic;color:#666;font-size:15px;}
.story-p:last-child{margin-bottom:0;}
.cursor{display:inline-block;width:1.5px;height:.9em;background:#aaa;margin-left:1px;vertical-align:middle;animation:blink .75s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
.skip-hint{font-size:11px;color:#ccc;text-align:center;margin-top:2rem;letter-spacing:.05em;cursor:pointer;}
.skip-hint:hover{color:#aaa;}

/* Question */
.q-wrap{padding:.5rem 0;}
.q-badge{display:inline-block;font-size:11px;color:#888;border:.5px solid #ddd;padding:4px 14px;border-radius:20px;margin-bottom:1.5rem;letter-spacing:.1em;}
.q-num{font-size:12px;color:#888;margin-bottom:.5rem;letter-spacing:.1em;}
.q-text{font-size:15px;line-height:2.1;color:#2a2a2a;white-space:pre-line;margin-bottom:2rem;word-break:keep-all;}
.q-textarea{width:100%;min-height:130px;border:.5px solid #ccc;border-radius:3px;padding:14px;font-family:'Noto Serif KR',Georgia,serif;font-size:14px;line-height:1.9;resize:vertical;background:#fff;color:#1a1a1a;outline:none;font-weight:300;}
.q-textarea:focus{border-color:#888;}
.q-meta{display:flex;justify-content:space-between;align-items:center;margin-top:8px;}
.q-hint{font-size:12px;color:#888;}
.q-counter{font-size:12px;color:#888;}
.q-counter.ok{color:#5a8a5a;}

/* Epilogue */
.epi-rule{border:none;border-top:.5px solid #ddd;margin:3rem 0;}
.epi-p{font-size:14px;line-height:2.4;color:#5c5c5c;text-align:center;margin-bottom:.6em;}
.epi-end{text-align:center;font-size:12px;letter-spacing:.3em;color:#999;margin-top:2.5rem;}

/* Done */
.done-wrap{text-align:center;padding:5rem 1rem 3rem;}
.done-icon{font-size:44px;margin-bottom:1.5rem;}
.done-title{font-size:22px;font-weight:500;margin-bottom:1.25rem;letter-spacing:.05em;}
.done-text{font-size:14px;color:#5c5c5c;line-height:2.1;margin-bottom:2rem;word-break:keep-all;}
.done-src{font-size:12px;color:#888;line-height:1.9;margin-top:2.5rem;border-top:.5px solid #eee;padding-top:1.5rem;}

.fade-in{animation:fin .45s ease both;}
@keyframes fin{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:600px){
  #content{padding:3rem 1.25rem 7rem;}
  .cover-title{font-size:24px;}
  .story-p{font-size:15px;}
  .q-text{font-size:14px;}
}
</style>
</head>
<body>
<div id="pbar-wrap"><div id="pbar"></div></div>
<span id="indicator"></span>
<div id="content"></div>
<div id="nav-wrap">
  <button id="prev-btn" class="btn" onclick="goPrev()" disabled>← 이전</button>
  <button id="next-btn" class="btn btn-dark" onclick="goNext()" disabled>읽기 시작</button>
</div>

<script>
const PAGES = [
  { type:'cover' },

  { type:'story', items:[
    ['', `점심시간이면 교실 뒤편은 언제나 조금 달라졌다.`],
    ['', `책상 두 개를 붙여 만든 임시 무대 위에서 젠가 탑이 매일 다시 세워졌다가 무너졌다. 나무 블록 마흔여덟 개가 쌓아 올린 탑은, 누군가 조심스럽게 한 조각을 빼낼 때마다 미세하게 떨렸다. 그 흔들림을 보면서 아이들은 탄성을 지르기도 하고 숨을 참기도 했다. 하은은 그 광경을 멀찍이서 바라보는 편이었다. 직접 블록을 만지는 것보다 흔들리는 탑을 지켜보는 쪽이 더 흥미로웠다. 무엇이 저것을 버티게 하는지, 혹은 무엇이 결국 저것을 쓰러뜨리는지.`],
    ['dialogue', `"야, 이건 그냥 시간문제야."`],
    ['', `구경하던 민재가 탑을 향해 턱짓하며 말했다. 그의 눈은, 그러나 탑이 아닌 교실 문 쪽을 향하고 있었다.`],
    ['', `하은은 그 눈길을 좇았다. 복도에는 아무것도 없었다.`],
  ]},

  { type:'story', items:[
    ['', `그날 오후의 일은, 나중에 돌이켜보면 우연이라기엔 너무 선명했다.`],
    ['', `학생회 준비실 문은 반쯤 열려 있었다. 안에서 말소리가 새어 나왔고, 하은은 선배들이 나오기를 기다리며 문 옆 벽에 등을 기댔다. 처음에는 그냥 소음으로 흘려들었다. 그러다 어느 순간, 귀가 선명해졌다.`],
    ['dialogue', `"티셔츠 제작비는 그냥 학생회 계좌로 넘기면 돼. 업체 영수증은 우리가 맞춰서 끊고."`],
    ['', `학생회장 재현 선배였다. 목소리가 낮고 익숙했다. 협박하는 것도, 강요하는 것도 아니었다. 그냥 당연한 일을 설명하는 것처럼 담담했다. 그게 오히려 더 이상했다.`],
    ['dialogue', `"그래도 되나요? 그 돈은 학생들이 낸 거잖아요."`],
    ['', `낯선 목소리였다. 가늘고 조심스러웠다. 아마 새로 들어온 1학년 서기인 것 같았다.`],
    ['dialogue', `"다들 이렇게 해왔어. 작년도, 재작년도. 우리 팀이잖아, 이제."`],
    ['', `짧은 침묵이 흘렀다. 그 침묵은 무언가를 담고 있었다. 허락이라기보다는 굴복에 가까운.`],
    ['dialogue', `"……알겠습니다."`],
    ['', `하은은 발소리를 죽이고 그 자리를 떠났다. 복도 끝을 돌아 계단을 내려오는 내내, 자신이 지금 보아서는 안 될 것을 본 것인지, 아니면 들어서는 안 될 것을 들은 것인지 분간이 되지 않았다.`],
  ]},

  { type:'story', items:[
    ['', `집에 돌아와 책상 앞에 앉았지만 아무것도 손에 잡히지 않았다.`],
    ['thought', `다들 이렇게 해왔어.`],
    ['', `그 말이 머릿속에서 반복됐다. 단순한 문장이었는데도, 걸리적거렸다. 체육대회 티셔츠 제작비는 학생들이 각자 3천 원씩 걷은 돈이었다. 하은도 냈다. 반 친구들도 다들 냈다. 누군가의 엄마가 봉투에 넣어 아침에 챙겨준 돈이었다.`],
    ['thought', `그냥 모른 척하면 되지 않나.`],
    ['', `어차피 재현 선배는 곧 졸업이다. 이제 몇 달만 지나면 사라질 사람 때문에 내가 나설 필요가 있나. 어른들이 알아서 처리하겠지. 원래 이런 일들은 어딘가에서 조용히 해결되는 법이니까.`],
    ['', `하은은 이불을 뒤집어썼다.`],
    ['', `그런데 잠이 오지 않았다. 눈을 감으면 젠가 탑이 떠올랐다. 흔들리면서도 버티는 탑. 하지만 하단에서 블록이 하나씩 빠질 때마다, 탑은 조금씩 더 허물어질 준비를 하고 있었다.`],
  ]},

  { type:'story', items:[
    ['', `다음 날 하은은 쉬는 시간에 민재를 복도로 불러냈다.`],
    ['', `민재는 하은의 가장 오래된 친구였다. 초등학교 입학 첫날부터 나란히 앉았고, 서로 말하기 어려운 것들을 말해온 사이였다. 하은은 어제 들은 것을 조심스럽게, 그러나 사실 그대로 털어놓았다.`],
    ['', `민재의 표정이 굳었다. 듣는 내내 눈이 조금씩 가라앉았다.`],
    ['dialogue', `"……진짜로?"`],
    ['dialogue', `"내가 직접 들었어."`],
    ['', `민재는 한동안 창밖을 봤다. 운동장에서 공이 튀는 소리가 들렸다.`],
    ['dialogue', `"하은아. 그냥 넘어가자."`],
    ['dialogue', `"재현 선배 어차피 3학년이잖아. 졸업하면 끝이야. 우리가 나섰다가 괜히 미운 털 박히면, 남은 1년이 얼마나 피곤해지겠어. 그리고……"`],
    ['', `민재가 잠깐 말을 멈췄다. 뭔가를 재고 있는 것 같았다.`],
    ['dialogue', `"솔직히 말하면, 나 내년에 학생회 들어가고 싶어. 진심으로. 근데 지금 이걸 건드렸다가 내가 이상한 애 취급받으면 어떡해."`],
    ['', `하은은 할 말이 없었다. 민재가 틀린 말을 한 건 아니었다. 오히려 너무 현실적이어서, 반박하기가 더 어려웠다.`],
  ]},

  { type:'question', qn:1,
    q:`민재는 하은에게 "그냥 넘어가자"고 했어요.
자신의 꿈과 안전을 지키기 위해서였죠.

만약 당신이 하은이었다면, 친구의 말을 들은 후
어떤 감정을 느꼈을 것 같나요?
그리고 어떻게 행동했을 것 같나요?


--------------------------------------------------`,
    min:20, isLast:false },

  { type:'story', items:[
    ['', `그 뒤로 며칠이 지났다.`],
    ['', `하은은 아무것도 하지 않았다. 학교에 가고, 수업을 듣고, 밥을 먹고, 집에 왔다. 재현 선배가 복도에서 지나칠 때는 자연스럽게 시선을 내렸다. 학생회 서기로 보이는 1학년 아이가 게시판 앞에 서 있는 것을 보았을 때도, 괜히 다른 방향으로 걸음을 돌렸다.`],
    ['', `침묵은 생각보다 힘들지 않았다. 적어도 처음에는.`],
    ['', `그런데 시간이 지날수록 이상한 감각이 생겼다. 마치 신발 안에 작은 돌멩이가 들어간 것처럼, 걸을 때마다 느껴지지만 멈춰서 꺼내기엔 귀찮은 그런 감각. 무시하면 무시할수록 조금씩 더 깊이 박혔다.`],
    ['', `점심시간마다 젠가 탑을 볼 때도 그랬다. 누군가 블록을 빼낼 때마다 탑이 흔들렸고, 아이들이 웃음을 터뜨렸고, 하은은 그 웃음 사이에서 괜히 가슴이 조여들었다.`],
  ]},

  { type:'story', items:[
    ['', `체육대회를 이틀 앞둔 목요일 오전, 담임 선생님이 교실 문을 닫으며 말했다.`],
    ['dialogue', `"얘들아, 잠깐."`],
    ['', `목소리가 평소와 달랐다. 아이들이 하나둘 선생님 쪽을 돌아봤다.`],
    ['dialogue', `"체육대회 티셔츠 제작비가 실제 비용보다 훨씬 많이 청구됐다는 얘기를 들었어. 혹시 아는 게 있는 사람, 없니?"`],
    ['', `교실이 순식간에 조용해졌다. 아무도 손을 들지 않았다. 창밖에서 바람 소리가 들렸다.`],
    ['', `하은의 심장이 빠르게 뛰었다. 책상을 짚은 손에 힘이 들어갔다.`],
    ['', `선생님의 눈이 교실을 천천히 훑었다. 그 눈이 하은을 지나칠 때, 하은은 바닥을 봤다.`],
    ['dialogue', `"……알면 언제든 선생님한테 와. 혼내려는 게 아니야."`],
    ['', `그리고 조용히 나갔다.`],
    ['', `하은은 손을 내려다봤다. 펜을 쥐고 있었는데, 손바닥이 땀으로 젖어 있었다.`],
  ]},

  { type:'story', items:[
    ['', `방과 후, 운동장을 가로질러 집으로 가던 하은은 벤치 하나 앞에서 발이 멈췄다.`],
    ['', `구석 벤치에 누군가 혼자 앉아 있었다. 가방을 무릎 위에 올린 채, 앞도 옆도 아닌 어딘가 중간쯤을 바라보는 사람. 학생회 서기, 1학년 아이였다. 이름을 하은은 아직 몰랐다.`],
    ['thought', `그냥 지나가면 돼.`],
    ['', `그런데 발이 움직이지 않았다. 어쩌면 이미 알고 있었는지도 몰랐다. 저 아이도 누군가에게 말하지 못한 무언가를 안고 저 자리에 앉아 있다는 것을.`],
    ['', `하은은 천천히 걸어가 그 옆에 앉았다. 아이는 놀라지 않았다.`],
    ['dialogue', `"준비실 앞에 계셨잖아요. 그날."`],
    ['', `하은은 잠시 말을 잃었다. 알고 있었구나. 서로 알고 있었구나.`],
    ['dialogue', `"무서웠어요?"`],
    ['dialogue', `"응."`],
    ['dialogue', `"저도요."`],
    ['', `또 침묵이 흘렀다. 그런데 이번 침묵은 조금 달랐다. 무언가를 숨기는 침묵이 아니라, 서로 같은 것을 알고 있다는 침묵이었다.`],
    ['dialogue', `"팀이니까 같이 가야 한다고. 나 혼자만 빠지면 어떻게 되는지 알겠냐고."`],
    ['', `직접적인 위협이 아니었을 것이다. 아마 그 선배는 그냥 사실을 말했을 것이다. 그게 더 효과적이라는 걸 알고 있는 것처럼.`],
    ['dialogue', `"그 탑 있잖아. 블록을 아래서부터 하나씩 빼내면 위가 점점 불안정해지잖아. 우리가 아무것도 안 하면, 그 구멍이 그냥 남는 거잖아. 탑이 무너질 때까지."`],
    ['dialogue', `"저 혼자선 못 할 것 같아요."`],
    ['dialogue', `"혼자가 아니면?"`],
  ]},

  { type:'question', qn:2,
    q:`하은은 며칠 동안 알고도 침묵했어요.
두렵고, 귀찮고, 나와 상관없는 일처럼 느껴졌기 때문이에요.

여러분은 주변에서 부당한 일을 보거나 들은 적이 있나요?
그때 어떻게 행동했나요?
지금 돌이켜본다면 어떻게 하고 싶나요?


--------------------------------------------------`,
    min:20, isLast:false },

  { type:'story', items:[
    ['', `다음 날 아침, 하은은 등교 직후 교무실 문 앞에 섰다.`],
    ['', `손이 가볍게 떨렸다. 일이 어떻게 전개될지 몰랐다. 재현 선배가 어떻게 반응할지, 학교가 이 일을 어떻게 다룰지, 민재와의 사이가 어색해질지. 아무것도 확신할 수 없었다. 다만 한 가지, 이 문을 두드리지 않으면 며칠 뒤에도, 몇 달 뒤에도, 아마 훨씬 나중에도 이 감각을 달고 살아야 한다는 것만은 알고 있었다.`],
    ['', `하은은 문을 두드렸다.`],
    ['dialogue', `"선생님, 드릴 말씀이 있어요."`],
  ]},

  { type:'story', items:[
    ['', `이후의 일들은 하은이 예상했던 것보다 조용하게, 그러나 확실하게 진행됐다.`],
    ['', `학생회 예산 문제가 학교 전반에 알려졌고, 재현 선배는 학생회장 자리를 내려놓았다. 교사들이 개입했고, 예산 전반에 대한 재검토가 이루어졌다. 복도에서는 며칠간 수군거림이 이어졌다.`],
    ['', `민재는 한동안 말을 걸지 않았다. 눈이 마주쳐도 먼저 시선을 거뒀다. 하은은 그 공백이 아프기도 했고, 또 어쩔 수 없기도 했다.`],
    ['', `그래도 이상하게, 잠은 잘 왔다.`],
  ]},

  { type:'story', items:[
    ['', `체육대회 당일 아침, 하은은 운동장 가장자리에서 지오를 다시 만났다. 지오는 새로 제작된 티셔츠를 입고 있었다. 이번엔 학생들이 낸 돈이 정확히 쓰인 것이었다.`],
    ['dialogue', `"있잖아요. 젠가 탑, 무너지면 다시 쌓으면 되잖아요. 처음부터 다시. 더 단단하게."`],
    ['thought', `더 단단하게.`],
    ['', `그 말을 씹으며 걷는 동안, 운동장 흙이 발밑에서 단단하게 느껴졌다.`],
    ['', `그로부터 며칠 뒤, 민재가 먼저 말을 걸어왔다.`],
    ['dialogue', `"나, 잘못 생각한 거 맞지?"`],
    ['dialogue', `"응."`],
    ['dialogue', `"근데 솔직히 나는 아직도 무서워. 그런 상황이 또 오면 어떻게 할지 모르겠어."`],
    ['dialogue', `"나도."`],
    ['', `창밖에 오후 햇살이 길게 드리워져 있었다. 먼지가 빛 속에서 천천히 떠다녔다. 아무것도 해결되지 않은 것들이 여전히 많았다. 그래도 조금은 — 아주 조금은 — 달라진 것 같기도 했다.`],
    ['dialogue', `"젠가 한 판 더!"`],
    ['', `블록 부딪히는 소리가 났다. 탑이 또 세워지고 있었다.`],
  ]},

  { type:'epilogue', lines:[
    `어떤 탑은 견고해 보여도 속이 비어 있다.`,
    `아래에서부터, 보이지 않는 곳에서부터.`,
    `우리는 그것을 알면서도 오래 침묵한다.`,
    `침묵이 안전처럼 느껴지기 때문에.`,
    `혹은, 무너지는 것을 내 탓으로 만들고 싶지 않기 때문에.`,
    `그러나 탑은 결국 무너진다.`,
    `침묵한 사람의 발 앞에도, 말한 사람의 발 앞에도.`,
    `차이가 있다면 단 하나다.`,
    `무너진 뒤, 무엇을 손에 쥐고 있느냐.`,
    `--------------------------------------------------`,
  ]},

  { type:'question', qn:3,
    q:`이 소설을 다 읽었어요.

하은은 두려움을 무릅쓰고 진실을 말했어요.
그것이 바로 청렴한 용기였습니다.

나에게 "청렴"이란 어떤 의미인지 생각해 보세요.
그리고 내가 학교나 일상에서 실천할 수 있는
청렴한 행동을 한 가지 구체적으로 적어 보세요.`,
    min:20, isLast:true },

  { type:'done' }
];

// ── State ──
let cur = 0;
let typing = false;
let skipTyping = false;
let renderId = 0;
const answers = {};
const seenStoryPages = new Set();

const storyPages = PAGES.filter(p => p.type === 'story' || p.type === 'question' || p.type === 'epilogue').length;

function updateProgress() {
  const total = PAGES.length - 1;
  document.getElementById('pbar').style.width = (cur / total * 100) + '%';
  const storyIdx = PAGES.slice(0, cur + 1).filter(p => p.type !== 'cover' && p.type !== 'done').length;
  const storyTotal = PAGES.filter(p => p.type !== 'cover' && p.type !== 'done').length;
  if (cur > 0 && cur < PAGES.length - 1) {
    document.getElementById('indicator').textContent = storyIdx + ' / ' + storyTotal;
  } else {
    document.getElementById('indicator').textContent = '';
  }
}

function setBtn(text, enabled) {
  const b = document.getElementById('next-btn');
  b.textContent = text;
  b.disabled = !enabled;
}

function goNext() {
  if (cur < PAGES.length - 1) { cur++; render(); }
}

function goPrev() {
  if (cur > 0) { cur--; render(); }
}

function render() {
  renderId++;
  updateProgress();
  const page = PAGES[cur];
  const c = document.getElementById('content');
  c.innerHTML = '';
  typing = false; skipTyping = false;
  document.getElementById('prev-btn').disabled = (cur === 0);

  if (page.type === 'cover') renderCover(c);
  else if (page.type === 'story') renderStory(c, page);
  else if (page.type === 'question') renderQuestion(c, page);
  else if (page.type === 'epilogue') renderEpilogue(c, page);
  else if (page.type === 'done') renderDone(c);
}

// ── Cover ──
function renderCover(c) {
  c.innerHTML = `
    <div class="cover fade-in">
      <p class="cover-src">이 소설은 정진영 작가의 장편소설 《젠가》의 주제에서 영감을 받아<br>교육 목적으로 창작된 독립 단편입니다.</p>
      <h1 class="cover-title">마지막 블록</h1>
      <div class="cover-deco">
        <span class="cover-deco-line"></span>
        <em class="cover-deco-text">단편소설</em>
        <span class="cover-deco-line"></span>
      </div>
      <div class="cover-guide">
        <b>읽는 방법</b><br>
        글이 한 글자씩 나타나요. 글을 천천히 따라 읽어 보세요.<br>
        중간에 질문이 나오면, 솔직하게 20자 이상 적어야 다음으로 넘어갈 수 있어요.<br>
        화면을 누르면 글이 바로 나타나요.
      </div>
    </div>`;
  setBtn('읽기 시작', true);
}

// ── Story ──
function renderStory(c, page) {
  const wrap = document.createElement('div');
  wrap.className = 'story-page fade-in';
  c.appendChild(wrap);
  const myId = renderId;
  const pageIdx = cur;

  if (seenStoryPages.has(pageIdx)) {
    page.items.forEach(([cls, text]) => {
      const p = document.createElement('p');
      p.className = 'story-p' + (cls ? ' ' + cls : '');
      p.textContent = text;
      wrap.appendChild(p);
    });
    setBtn('다음 →', true);
    return;
  }

  setBtn('다음 →', false);
  typeParagraphs(wrap, page.items, 0, () => {
    seenStoryPages.add(pageIdx);
    setTimeout(() => { if (myId === renderId) setBtn('다음 →', true); }, 400);
  }, myId);
}

function typeParagraphs(wrap, items, idx, done, myId) {
  if (myId !== renderId) return;
  if (idx >= items.length) { done(); return; }
  typing = true;
  const [cls, text] = items[idx];
  const p = document.createElement('p');
  p.className = 'story-p' + (cls ? ' ' + cls : '');
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  p.appendChild(cursor);
  wrap.appendChild(p);

  const speed = Math.max(22, Math.floor(2200 / text.length));
  let i = 0;

  function tick() {
    if (myId !== renderId) return;
    if (skipTyping) {
      p.textContent = text;
      wrap.querySelectorAll('.cursor').forEach(el => el.remove());
      const nextCursor = document.createElement('span');
      nextCursor.className = 'cursor';
      p.appendChild(nextCursor);
      finishAllParagraphs(wrap, items, idx + 1, done, myId);
      return;
    }
    if (i < text.length) {
      p.textContent = text.slice(0, ++i);
      p.appendChild(cursor);
      setTimeout(tick, speed);
    } else {
      cursor.remove();
      typing = false;
      setTimeout(() => typeParagraphs(wrap, items, idx + 1, done, myId), 320);
    }
  }
  tick();
}

function finishAllParagraphs(wrap, items, startIdx, done, myId) {
  if (myId !== renderId) return;
  for (let i = startIdx; i < items.length; i++) {
    const [cls, text] = items[i];
    const p = document.createElement('p');
    p.className = 'story-p' + (cls ? ' ' + cls : '');
    p.textContent = text;
    wrap.appendChild(p);
  }
  wrap.querySelectorAll('.cursor').forEach(el => el.remove());
  typing = false;
  skipTyping = false;
  done();
}

// ── Question ──
function renderQuestion(c, page) {
  setBtn('다음 →', false);
  const qLabels = ['첫 번째 질문', '두 번째 질문', '마지막 질문'];
  c.innerHTML = `
    <div class="q-wrap fade-in">
      <p class="q-badge">✦ 잠깐, 생각해볼게요</p>
      <p class="q-num">${qLabels[page.qn - 1]}</p>
      <p class="q-text" id="q-text"></p>
      <textarea class="q-textarea" id="q-ans" placeholder="여기에 솔직하게 적어 보세요..." oninput="checkQ(${page.min},${!!page.isLast})"></textarea>
      <div class="q-meta">
        <span class="q-hint">${page.min}자 이상 입력하면 다음으로 넘어갈 수 있어요</span>
        <span class="q-counter" id="q-cnt">0 / ${page.min}</span>
      </div>
    </div>`;
  document.getElementById('q-text').innerText = page.q;
  document.getElementById('q-ans').value = answers[page.qn] || '';
  checkQ(page.min, !!page.isLast);
}

function checkQ(min, isLast) {
  const val = document.getElementById('q-ans').value;
  answers[PAGES[cur].qn] = val;
  const len = val.length;
  const cnt = document.getElementById('q-cnt');
  cnt.textContent = len + ' / ' + min;
  cnt.className = 'q-counter' + (len >= min ? ' ok' : '');
  setBtn(isLast ? '완료하기' : '다음 →', len >= min);
}

// ── Epilogue ──
function renderEpilogue(c, page) {
  const lines = (page && page.lines) ? page.lines : [];
  let inner = '<div class="fade-in"><div class="epi-rule"></div>';
  lines.forEach(line => {
    if (!line) inner += '<p class="epi-p">&nbsp;</p>';
    else inner += '<p class="epi-p">' + line + '</p>';
  });
  inner += '<p class="epi-end">끝</p><div class="epi-rule"></div></div>';
  c.innerHTML = inner;
  setBtn('마지막 질문으로 →', true);
}

// ── Done ──
function renderDone(c) {
  document.getElementById('nav-wrap').style.display = 'none';
  document.getElementById('indicator').textContent = '';
  c.innerHTML = `
    <div class="done-wrap fade-in">
      <div class="done-icon">📖</div>
      <h2 class="done-title">잘 읽었어요</h2>
      <p class="done-text">
        하은처럼, 두렵더라도 옳은 일을 선택하는 용기.<br>
        그것이 청렴의 시작이에요.<br><br>
        오늘 여러분이 적은 생각들이<br>
        언젠가 진짜 선택의 순간에 힘이 되길 바랍니다.
      </p>
      <p class="done-src">
        이 소설은 정진영 작가의 장편소설 《젠가》의 주제에서<br>
        영감을 받아 교육 목적으로 창작된 독립 단편입니다.
      </p>
    </div>`;
}

// ── Init ──
render();
</script>
</body>
</html>
