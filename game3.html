<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>청렴 탐정 3 — 불공정한 무대</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#e8f4ff;font-family:'Jua','Apple SD Gothic Neo','Malgun Gothic',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:1rem}
#app{width:100%;max-width:480px;display:flex;flex-direction:column;gap:12px}

.top-bar{background:#fff;border-radius:16px;padding:0.85rem 1.25rem;display:flex;align-items:center;justify-content:space-between;border:1px solid #c0d8f0;box-shadow:0 2px 8px rgba(100,160,220,0.1)}
.game-title{font-size:14px;font-weight:700;color:#1a4a7a;letter-spacing:-0.3px}
.chapter-badge{font-size:12px;color:#4a80b0;background:#ddeeff;border:1px solid #a0c8f0;border-radius:20px;padding:3px 12px;font-weight:600}

#screen{background:#f0f8ff;border-radius:20px;padding:1.25rem;min-height:360px;border:1px solid #c0d8f0;display:flex;flex-direction:column;justify-content:flex-end;gap:12px;overflow:hidden;box-shadow:inset 0 2px 8px rgba(100,160,220,0.08)}

.line{animation:fadeUp 0.22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

.narr{font-size:17px;color:#2a4a7a;font-style:italic;font-weight:700;text-align:center;padding:8px 16px;background:rgba(140,190,240,0.22);border-radius:20px;margin:4px 0;word-break:keep-all;line-height:1.65;letter-spacing:-0.2px}
.narr-bold{font-size:13.5px;color:#2a4a7a;font-weight:700;text-align:center;padding:8px 14px;background:rgba(100,160,230,0.13);border-radius:20px;margin:2px 0;word-break:keep-all;line-height:1.6;border:1px solid #c0d8f0}

.row{display:flex;align-items:flex-end;gap:8px}
.row.right{flex-direction:row-reverse}
.avatar{width:92px;height:92px;border-radius:50%;flex-shrink:0;overflow:hidden;border:2px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,0.1)}
.bubble-wrap{display:flex;flex-direction:column;gap:3px;max-width:74%}
.row.right .bubble-wrap{align-items:flex-end}
.char-name{font-size:14px;font-weight:800;padding:0 4px;letter-spacing:-0.2px}
.bubble{padding:0.65rem 0.95rem;border-radius:14px;font-size:17px;line-height:1.75;word-break:keep-all}

.nm-jaei{color:#1a5a9a}.bbl-jaei{background:#ddeeff;color:#0a3060;border:1px solid #a8c8f0;border-bottom-right-radius:4px}
.nm-soyul{color:#7a1a6a}.bbl-soyul{background:#fce8f8;color:#4a0a40;border:1px solid #e8a0d8;border-bottom-left-radius:4px}
.nm-biyeol{color:#6a5a00}.bbl-biyeol{background:#fefce0;color:#3a3000;border:1px solid #d8cc60;border-bottom-left-radius:4px}
.nm-teacherbad{color:#8a3a00}.bbl-teacherbad{background:#fff0e0;color:#4a1800;border:1px solid #f0a060;border-bottom-left-radius:4px}
.nm-minhyuk{color:#a02020}.bbl-minhyuk{background:#fde8e8;color:#6a1010;border:1px solid #f0a8a8;border-bottom-left-radius:4px}
.nm-teachergood{color:#5a2a9a}.bbl-teachergood{background:#ede8ff;color:#2a1060;border:1px solid #b898e8;border-bottom-left-radius:4px}
.nm-mom{color:#5a2a4a}.bbl-mom{background:#fce8f0;color:#3a0a28;border:1px solid #e0a0c0;border-bottom-left-radius:4px}
.nm-principal{color:#3a3a8a}.bbl-principal{background:#e8e8ff;color:#1a1a60;border:1px solid #a8a8e0;border-bottom-left-radius:4px}
.nm-student1{color:#2a6a3a}.bbl-student1{background:#e8f5ec;color:#0a3a18;border:1px solid #90d0a8;border-bottom-left-radius:4px}
.nm-student2{color:#4a3a00}.bbl-student2{background:#f8f4e0;color:#2a2000;border:1px solid #c8b860;border-bottom-left-radius:4px}
.nm-student3{color:#2a3a7a}.bbl-student3{background:#e8ecff;color:#0a1860;border:1px solid #a0b0e8;border-bottom-left-radius:4px}
.nm-hojun{color:#1a6030}.bbl-hojun{background:#e0f5e8;color:#0a3018;border:1px solid #80c8a0;border-bottom-left-radius:4px}
.nm-seoeun{color:#1a6040}.bbl-seoeun{background:#e0f5ec;color:#0a3a20;border:1px solid #80c8a0;border-bottom-left-radius:4px}

#click-area{background:#fff;border:1.5px solid #a8ccee;border-radius:14px;padding:1rem 1.25rem;text-align:center;cursor:pointer;font-size:17px;color:#2a6aa0;font-weight:700;user-select:none;transition:all 0.15s;box-shadow:0 2px 6px rgba(100,160,220,0.12)}
#click-area:hover{background:#ddeeff;border-color:#6aa8d8}
#click-area:active{transform:scale(0.97)}

.choices{display:flex;flex-direction:column;gap:8px}
.choice-btn{background:#fff;border:1.5px solid #a8ccee;border-radius:12px;padding:0.9rem 1.1rem;text-align:left;font-size:17px;color:#1a4a7a;cursor:pointer;line-height:1.55;word-break:keep-all;transition:all 0.15s;font-family:inherit;font-weight:500}
.choice-btn:hover{background:#ddeeff;border-color:#5a98d0}
.choice-label{font-weight:700;color:#2a7ad0;margin-right:6px}

.quiz-wrap{background:#fff;border:1.5px solid #a8ccee;border-radius:16px;padding:1.25rem}
.quiz-tag{font-size:11px;font-weight:700;color:#2a7ad0;margin-bottom:8px;letter-spacing:0.5px;background:#ddeeff;display:inline-block;padding:3px 10px;border-radius:20px}
.quiz-q{font-size:17px;font-weight:800;color:#1a3a6a;margin-bottom:12px;line-height:1.65;word-break:keep-all}
.quiz-opts{display:flex;flex-direction:column;gap:7px}
.qbtn{background:#f4f8ff;border:1px solid #b8d4f0;border-radius:10px;padding:0.75rem 1rem;text-align:left;font-size:16px;color:#1a3a6a;cursor:pointer;line-height:1.55;word-break:keep-all;transition:all 0.15s;font-family:inherit}
.qbtn:hover{background:#ddeeff}.qbtn:disabled{cursor:default;opacity:0.7}
.q-correct{background:#e0f5ea;color:#0a4020;border:1px solid #80c898;padding:0.6rem 0.85rem;border-radius:10px;font-size:13px;font-weight:600;margin-top:8px}
.q-wrong{background:#fde8e8;color:#7a1a1a;border:1px solid #f0a0a0;padding:0.6rem 0.85rem;border-radius:10px;font-size:13px;font-weight:600;margin-top:8px}

.char-intro-wrap{background:#fff;border:1.5px solid #a8ccee;border-radius:16px;padding:1.25rem;display:flex;flex-direction:column;gap:10px}
.char-intro-tag{font-size:11px;font-weight:700;color:#2a7ad0;background:#ddeeff;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:4px}
.char-card{display:flex;gap:10px;align-items:flex-start;background:#f4f8ff;border:1px solid #c8dff0;border-radius:12px;padding:0.8rem 1rem}
.char-card-av{width:92px;height:92px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,0.1)}
.char-card-info{flex:1}
.char-card-name{font-size:13px;font-weight:700;color:#1a3a6a;margin-bottom:2px}
.char-card-role{font-size:11px;color:#4a80b0;margin-bottom:4px;font-weight:600}
.char-card-desc{font-size:12px;color:#4a6a8a;line-height:1.6;word-break:keep-all}

/* 점수표 미니게임 */
.score-table-wrap{background:#fff;border:1.5px solid #f0c060;border-radius:16px;padding:1.25rem}
.mini-tag{font-size:11px;font-weight:700;background:#fff4d8;color:#8a5a00;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.mini-tag-purple{background:#ede8ff;color:#5a2a9a}
.mini-tag-green{background:#e0f5ea;color:#1a6a30}
.mini-desc{font-size:13px;color:#5a4010;margin-bottom:12px;line-height:1.6;word-break:keep-all}
.score-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-bottom:12px}
.score-table th{background:#fff4d8;color:#6a4a00;padding:6px 4px;text-align:center;border:1px solid #f0d080;font-weight:700}
.score-table td{padding:7px 4px;text-align:center;border:1px solid #f0e8c0;color:#3a2a00}
.score-table tr:nth-child(even) td{background:#fffbf0}
.score-table .highlight{background:#fde8e8 !important;color:#a01010;font-weight:700}
.score-table .winner{background:#e0f5ea !important;color:#0a5020;font-weight:700}
.spot-btn{background:#fff4d8;border:1.5px solid #f0c060;border-radius:10px;padding:0.65rem 1rem;font-size:13px;color:#6a4a00;cursor:pointer;font-family:inherit;font-weight:600;width:100%;text-align:left;margin-bottom:7px;transition:all 0.15s;line-height:1.5;word-break:keep-all}
.spot-btn:hover{background:#ffe8a0}
.spot-btn.correct{background:#e0f5ea;border-color:#80c898;color:#0a4020}
.spot-btn.wrong{background:#fde8e8;border-color:#f0a0a0;color:#7a1a1a}
.spot-fb{font-size:13px;padding:0.6rem 0.85rem;border-radius:10px;font-weight:600;margin-top:6px;display:none;word-break:keep-all;line-height:1.55}
.spot-ok{background:#e0f5ea;color:#0a4020;border:1px solid #80c898}
.spot-ng{background:#fde8e8;color:#7a1a1a;border:1px solid #f0a0a0}

/* 목격자 인터뷰 미니게임 */
.interview-wrap{background:#fff;border:1.5px solid #b898e8;border-radius:16px;padding:1.25rem}
.witness-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.witness-row{display:flex;align-items:center;gap:10px;background:#f8f4ff;border:1px solid #c8b0e8;border-radius:12px;padding:0.75rem 1rem;cursor:pointer;transition:all 0.15s}
.witness-row:hover{background:#ede8ff}
.witness-row.done{opacity:0.6;cursor:default}
.witness-av{width:76px;height:76px;border-radius:50%;overflow:hidden;flex-shrink:0}
.witness-name{font-size:13px;font-weight:700;color:#3a1a7a}
.witness-hint{font-size:11px;color:#8a70b8;margin-top:1px}
.witness-badge{font-size:11px;padding:2px 8px;border-radius:8px;font-weight:700;margin-left:auto}
.badge-new{background:#ede8ff;color:#5a2a9a}
.badge-done{background:#e0f5ea;color:#0a5020}
.interview-box{background:#f8f4ff;border:1px solid #c8b0e8;border-radius:12px;padding:1rem;display:none;margin-bottom:10px}
.interview-q{font-size:13px;font-weight:700;color:#3a1a7a;margin-bottom:8px;word-break:keep-all}
.interview-opts{display:flex;flex-direction:column;gap:6px}
.interview-btn{background:#ede8ff;border:1px solid #c8b0e8;border-radius:8px;padding:0.6rem 0.9rem;text-align:left;font-size:12.5px;color:#2a0a60;cursor:pointer;font-family:inherit;line-height:1.5;word-break:keep-all;transition:all 0.15s}
.interview-btn:hover{background:#d8d0ff}
.interview-result{font-size:13px;padding:0.6rem 0.85rem;border-radius:8px;margin-top:8px;line-height:1.6;word-break:keep-all;display:none}
.ir-good{background:#e0f5ea;color:#0a4020;border:1px solid #80c898}
.ir-bad{background:#fff4d8;color:#5a3000;border:1px solid #f0c060}
.interview-progress{font-size:13px;font-weight:700;color:#5a2a9a;margin-bottom:10px}

/* 진술 분석 */
.stmt-wrap{background:#fff;border:1.5px solid #b898e8;border-radius:16px;padding:1.25rem}
.stmt-tag{font-size:11px;font-weight:700;color:#5a2a9a;background:#ede8ff;display:inline-block;padding:3px 10px;border-radius:20px;margin-bottom:8px}
.stmt-desc{font-size:13px;color:#4a3070;margin-bottom:12px;line-height:1.6;word-break:keep-all}
.stmt-card{background:#f8f4ff;border:1px solid #c8b0e8;border-radius:12px;padding:0.85rem 1rem;margin-bottom:8px}
.stmt-who{font-size:11px;font-weight:700;color:#5a2a9a;margin-bottom:5px}
.stmt-text{font-size:13px;color:#2a1060;line-height:1.65;word-break:keep-all}
.stmt-btns{display:flex;gap:7px;margin-top:8px;align-items:center}
.stmt-btn{font-size:12px;padding:5px 14px;border-radius:8px;cursor:pointer;border:1px solid #c8b0e8;background:#ede8ff;color:#3a1a7a;font-family:inherit;font-weight:600;transition:all 0.15s}
.stmt-btn:hover{background:#d8d0ff}
.stmt-badge{font-size:11px;padding:3px 8px;border-radius:8px;margin-left:6px;font-weight:700}
.badge-lie{background:#fde8e8;color:#7a1a1a}
.badge-truth{background:#e0f5ea;color:#0a4020}
.badge-unk{background:#f0f0f0;color:#888}
.stmt-fb{display:none;font-size:12px;color:#6a50a8;margin-top:6px;line-height:1.55;word-break:keep-all}

.score-box{background:#fff;border:1.5px solid #a8ccee;border-radius:14px;padding:1rem 1.25rem;display:flex;align-items:center;gap:16px}
.score-num{font-size:32px;font-weight:700;color:#2a7ad0}
.score-label{font-size:12px;color:#6a90b8}
.score-msg{font-size:14px;font-weight:700;color:#1a4a7a}
.score-sub{font-size:12px;color:#6a90b8;margin-top:2px}

.ending-box{border-radius:16px;padding:1.5rem;border:1.5px solid}
.end-a{background:#e8f8ee;border-color:#80c898}
.end-b{background:#fff8e8;border-color:#f0c060}
.end-c{background:#fde8e8;border-color:#f0a0a0}
.end-title{font-size:18px;font-weight:700;margin-bottom:10px}
.end-a .end-title{color:#0a5a28}
.end-b .end-title{color:#6a4a00}
.end-c .end-title{color:#7a1a1a}
.end-body{font-size:13.5px;line-height:1.9;color:#2a2a3a;word-break:keep-all;white-space:pre-line}
.lesson{background:#f4f8ff;border-radius:10px;padding:1rem;margin-top:12px;font-size:13px;color:#3a5a8a;line-height:1.7;border:1px solid #c0d8f0;word-break:keep-all}
.lesson-label{font-weight:700;color:#1a4a7a;display:block;margin-bottom:4px}

.restart-btn{background:#2a7ad0;border:none;border-radius:12px;padding:0.9rem 1.25rem;font-size:14px;color:#fff;cursor:pointer;width:100%;font-weight:700;font-family:inherit;transition:background 0.15s;margin-top:4px}
.restart-btn:hover{background:#1a5aa0}

.cheong-summary{background:#fff;border:1.5px solid #185FA5;border-radius:16px;padding:1.25rem;margin-top:4px}
.cheong-summary-title{font-size:15px;font-weight:800;color:#185FA5;margin-bottom:12px}
.cheong-card{background:#e8f4ff;border:1px solid #b5d4f4;border-radius:10px;padding:0.75rem 1rem;margin-bottom:8px;font-size:14px;color:#1a3a6a;line-height:1.7;word-break:keep-all}
.cheong-card-num{font-weight:800;color:#185FA5;margin-right:6px}
.cheong-point{background:#e8f4ff;border:1.5px solid #80b8e8;border-radius:10px;padding:0.75rem 1rem;margin-top:8px;font-size:14px;color:#1a4a7a;line-height:1.7;word-break:keep-all}
.cheong-point-label{font-weight:800;color:#185FA5;display:block;margin-bottom:4px}
.action-btns{display:flex;flex-direction:column;gap:8px;margin-top:4px}
.back-btn{background:#fff;border:1.5px solid #f0c060;border-radius:12px;padding:0.9rem 1.25rem;font-size:16px;color:#6a4a00;cursor:pointer;width:100%;font-weight:700;font-family:inherit;transition:all 0.15s}
.back-btn:hover{background:#fff8e8}

</style>
</head>
<body>
<div id="app">
  <div class="top-bar">
    <span class="game-title">청렴 탐정 3 — 불공정한 무대</span>
    <span class="chapter-badge" id="chbadge">프롤로그</span>
  </div>
  <div id="screen"></div>
  <div id="click-area" onclick="safeNextLine()">화면을 클릭해서 계속하기 ▶</div>
  <div id="choices-area"></div>
  <div id="mini-area"></div>
</div>

      {type:'narr',text:'운동장이 조용해졌다. 진짜로 조용해졌다. 600명이 숨을 참는 것 같았다.'},
      {type:'char',char:'jaei',text:'(속으로) 와. 이게 뭐야. 소율이가 이렇게 잘했어?'},
      {type:'narr',text:'소율의 목소리가 운동장 끝까지 퍼진다. 3분짜리 노래가 끝나자 환호성이 터졌다.'},
      {type:'narr',text:'신문부 기자로서 취재 중이던 나, 이재이는 손이 저릴 때까지 박수를 쳤다.'},
      {type:'char',char:'jaei',text:'(메모하며) 올해 페스티벌 1등은 소율이겠다. 이건 의심할 여지가 없어.'},
      {type:'narr',text:'네 번째 순서. 강민혁이 무대에 올랐다.'},
      {type:'narr',text:'예상보다 훨씬 잘했다. 진심으로 하고 있다는 느낌이 들었다. 재이는 취재 노트에 적었다. 민혁이도 열심히 했네.'},
      {type:'narr',text:'5명의 참가자 공연이 모두 끝났다. 심사위원석에는 축제 담당 최민수 선생님이 혼자 앉아 있다.'},
      {type:'narr',text:'원래 심사위원은 3명이어야 했는데, 나머지 두 분이 갑자기 빠졌다는 소문이 돌았다.'},
      {type:'narr-bold',text:'그리고 발표 순간이 왔다.'},
      {type:'char',char:'teacherbad',text:'"덕일 버스킹 페스티벌" 최종 결과를 발표하겠습니다. 1등… 3학년 4반 오비열 학생.'},
      {type:'narr',text:'운동장이 순간 조용해졌다. 그리고 여기저기서 웅성거림이 시작됐다.'},
      {type:'char',char:'student1',text:'(옆에서) 어? 비열이가 1등이야? 소율이 아니고?'},
      {type:'char',char:'student2',text:'비열이 공연 나쁘지 않았는데… 소율이가 훨씬 낫지 않았어?'},
      {type:'narr',text:'나는 무대 뒤편으로 시선을 돌렸다. 소율이가 결과표를 바라보며 굳어 있었다.'},
      {type:'narr',text:'그 옆에 민혁이가 서 있었다. 기타 케이스를 손에 든 채, 아무 표정도 없이 결과표를 바라보고 있었다.'},
    ],
    next:{type:'intro-chars'}
  },

  ch1:{chapter:'1장 — 뒤바뀐 결과',
    lines:[
      {type:'narr',text:'시상식이 끝나고 학생들이 흩어졌다. 나는 소율이에게 다가갔다.'},
      {type:'char',char:'jaei',text:'소율아… 괜찮아?'},
      {type:'char',char:'soyul',text:'응. 괜찮아. 심사 결과니까 어쩔 수 없지. 내가 부족했던 거겠지.'},
      {type:'char',char:'jaei',text:'아니, 그건 아닌 것 같은데. 나 오늘 공연 다 봤잖아. 소율이 네가 확실히…'},
      {type:'char',char:'soyul',text:'됐어, 재이야. 결과는 결과야.'},
      {type:'narr',text:'소율이는 억지로 웃으며 자리를 떴다. 뒤돌아서는 순간 눈가가 빨개진 게 보였다.'},
      {type:'char',char:'jaei',text:'(혼자) 이상하다. 점수표를 좀 더 자세히 봐야겠어.'},
      {type:'narr',text:'다음날 아침. 재이는 게시판에 붙은 심사 결과표 앞에 섰다. 꼼꼼히 들여다볼수록 이상한 점이 눈에 띄었다.'},
      {type:'char',char:'jaei',text:'음정·박자·무대매너는 점수 차이가 크지 않은데… 유독 "표현력" 항목만 비열이가 압도적으로 높다?'},
      {type:'narr',text:'그 항목 하나 때문에 순위가 뒤집혔다. 그리고 표현력 점수는 최민수 선생님 단독 심사였다.'},
    ],
    next:{type:'quiz',id:'q1'}
  },

  ch2:{chapter:'2장 — 점수표의 비밀',
    lines:[
      {type:'narr',text:'재이는 신문부 취재 명목으로 공식 심사 점수표 전체를 요청했다. 결과표보다 훨씬 자세한 항목별 점수가 담겨 있었다.'},
      {type:'char',char:'jaei',text:'직접 분석해보자. 어느 항목이 이상한지 찾아봐야 해.'},
    ],
    next:{type:'mini',id:'scoretable'}
  },

  ch2_5:{chapter:'2장 — 왜 혼자였을까',
    lines:[
      {type:'narr',text:'재이는 원래 심사위원이었던 두 선생님을 찾아갔다. 음악 담당 서은경 선생님과 체육 담당 김호준 선생님이었다.'},
      {type:'narr',text:'먼저 서은경 선생님을 찾아갔다.'},
      {type:'char',char:'seoeun',text:'나도 원래 심사위원이었는데… 대회 3일 전에 최 선생님이 문자를 보냈어요. "선생님, 혹시 그날 출장 일정 있으세요? 제가 착각했는지 선생님 일정이 겹치는 줄 알았어요"라고요.'},
      {type:'char',char:'jaei',text:'그래서 어떻게 하셨어요?'},
      {type:'char',char:'seoeun',text:'저는 일정 없다고 했는데, 며칠 후에 갑자기 공문이 왔어요. "연수 참가 대상자"로 제 이름이 올라와 있더라고요. 그 연수가 대회 당일이었어요.'},
      {type:'char',char:'jaei',text:'그 연수는 누가 신청한 거예요?'},
      {type:'char',char:'seoeun',text:'교무부에서 왔는데, 알고 보니 최 선생님이 요청한 거였어요. 그때는 몰랐는데, 지금 생각해보면 의도적으로 저를 빠지게 한 것 같아요.'},
      {type:'narr',text:'이번엔 김호준 선생님을 찾아갔다.'},
      {type:'char',char:'hojun',text:'나는 대회 이틀 전에 최 선생님한테 전화를 받았어요. "선생님, 제가 깜빡했는데 그날 학교 체육창고 재고 조사를 제가 부탁드려도 될까요? 행정실에서 급하게 요청이 왔다고요."'},
      {type:'char',char:'jaei',text:'그래서 하셨어요?'},
      {type:'char',char:'hojun',text:'네. 당연히 급한 일인 줄 알고요. 근데 나중에 행정실에 확인해보니 그런 요청을 한 적이 없다는 거예요. 최 선생님이 만들어낸 거였어요.'},
      {type:'narr',text:'계획적이었다. 최 선생님은 대회 전부터 혼자 심사할 수 있도록 치밀하게 준비한 것이다.'},
      {type:'char',char:'jaei',text:'(혼자) 왜 이렇게까지? 뭔가 더 있을 거야. 일단 비열이를 한 번 만나봐야겠어.'},
    ],
    next:{type:'scene',id:'ch3'}
  },

  ch3:{chapter:'3장 — 오비열을 만나다',
    lines:[
      {type:'narr',text:'점심시간. 재이는 오비열이 혼자 앉아 있는 걸 발견했다. 1등을 했는데도 표정이 어둡다.'},
      {type:'char',char:'jaei',text:'비열아, 축하해. 1등이네.'},
      {type:'char',char:'biyeol',text:'…어, 고마워.'},
      {type:'char',char:'jaei',text:'공연 열심히 준비했지? 연습 많이 했어?'},
      {type:'char',char:'biyeol',text:'응. 열심히 했어. 그러니까 된 거겠지.'},
      {type:'narr',text:'대답이 어딘가 힘이 없다.'},
      {type:'char',char:'jaei',text:'비열아, 표현력 항목에서 만점 받은 거 알아? 다른 참가자들이랑 점수 차이가 많이 나던데.'},
      {type:'char',char:'biyeol',text:'…그래? 잘 됐네.'},
      {type:'char',char:'jaei',text:'결과 발표 전에 어머니가 잘 될 것 같다고 하셨다며?'},
      {type:'char',char:'biyeol',text:'(움찔하며) …누가 그래?'},
      {type:'char',char:'jaei',text:'비열아, 나 신문부 기자야. 이상한 게 보이면 취재해야 해. 혹시 어머니가 뭔가 하신 거 아니야?'},
      {type:'char',char:'biyeol',text:'…그런 거 없어. 나 먼저 갈게.'},
      {type:'narr',text:'비열이가 자리를 피한다. 하지만 눈빛에서 뭔가를 감추려는 게 느껴진다.'},
      {type:'char',char:'jaei',text:'(혼자) 뭔가 알고 있는 것 같은데… 직접 물어봐서는 안 되겠어. 대회 전날 뭔가 있었는지 목격한 사람을 먼저 찾아봐야겠다.'},
      {type:'narr',text:'그때 뒤에서 목소리가 들렸다.'},
      {type:'char',char:'minhyuk',text:'너도 이상하다고 생각하지?'},
      {type:'narr',text:'돌아보니 민혁이였다.'},
      {type:'char',char:'jaei',text:'민혁이 너도 봤어?'},
      {type:'char',char:'minhyuk',text:'어. 나 표현력 점수가 제일 낮아. 오비열이 잘한 건 인정해. 근데 만점은 아니잖아.'},
      {type:'char',char:'jaei',text:'민혁아, 혹시 더 아는 거 있어?'},
      {type:'char',char:'minhyuk',text:'대회 전날, 오비열 어머니가 학교에 왔어. 내가 봤거든. 최 선생님 교무실 쪽으로 들어가는 거. 손에 쇼핑백 같은 거 들고 있었어.'},
      {type:'char',char:'jaei',text:'확실해?'},
      {type:'char',char:'minhyuk',text:'어. 나도 예전에 비슷한 짓 했으니까 이런 거 눈에 잘 띄더라.'},
      {type:'char',char:'minhyuk',text:'나는 이번엔 진짜로 했어. 징계 받고 나서 생각 많이 했거든. 그래서 이번엔 정말 실력으로 해보려고 했는데 이렇게 되면 안 되는 거잖아.'},
    ],
    next:{type:'mini',id:'interview'}
  },

  ch4:{chapter:'4장 — 비열이의 고백',
    lines:[
      {type:'narr',text:'목격자들의 증언이 모였다. 대회 전날 어머니가 최 선생님과 면담했고, 백화점 쇼핑백이 오갔다는 것.'},
      {type:'narr',text:'재이는 다시 비열이를 찾아간다. 이번엔 증거를 갖고, 차분하게.'},
      {type:'char',char:'jaei',text:'비열아, 나 대회 전날 어머니가 최 선생님 면담하신 거 알아. 그리고 선생님 차에 백화점 쇼핑백이 실린 것도.'},
      {type:'char',char:'biyeol',text:'…그건.'},
      {type:'char',char:'jaei',text:'나 너 탓하려는 게 아니야. 근데 솔직하게 말해줘야 할 것 같아.'},
      {type:'narr',text:'비열이가 오랫동안 말이 없다.'},
      {type:'char',char:'biyeol',text:'…어머니가 상품권 드렸어. 10만 원짜리. 나는 몰랐어, 처음엔. 나중에 어머니한테 들었는데 이미 대회가 끝난 뒤였어.'},
      {type:'char',char:'jaei',text:'어머니한테 뭐라고 하지 않았어?'},
      {type:'char',char:'biyeol',text:'했지. 근데 어머니가 "다들 이렇게 한다, 너 잘 되라고 한 거다"라고 하셔서… 내가 어떻게 해.'},
      {type:'char',char:'jaei',text:'"다들 이렇게 한다"는 말로 잘못된 걸 정당화할 순 없어. 비열아, 넌 직접 한 게 아니잖아. 하지만 이 결과가 계속되면 소율이는 억울한 채로 끝나.'},
      {type:'char',char:'biyeol',text:'…나도 알아. 무대에 서는 내내 마음이 편하지 않았어. 소율이 공연 봤거든. 솔직히 나보다 훨씬 잘했어.'},
      {type:'char',char:'jaei',text:'그럼 용기 낼 수 있어? 사실대로 말해주면 재심사를 받을 수 있어.'},
      {type:'narr',text:'비열이가 창밖을 바라보다 천천히 고개를 끄덕였다.'},
      {type:'char',char:'biyeol',text:'…할게. 사실대로 말할게.'},
    ],
    next:{type:'quiz',id:'q3'}
  },

  ch5:{chapter:'5장 — 최민수 선생님',
    lines:[
      {type:'narr',text:'재이는 최민수 선생님을 찾아간다. 비열이의 진술과 목격자 증언을 손에 쥐고.'},
      {type:'char',char:'jaei',text:'선생님, 이번 버스킹 대회 심사 관련해서 여쭤볼 게 있어요.'},
      {type:'char',char:'teacherbad',text:'신문부 취재? 좋아. 공정하게 심사했어.'},
      {type:'char',char:'jaei',text:'표현력 항목만 비열이가 압도적으로 높던데, 다른 항목들이랑 너무 차이가 나요.'},
      {type:'char',char:'teacherbad',text:'그건 내 심사 기준이야. 표현력이 공연에서 제일 중요하다고 봐.'},
      {type:'char',char:'jaei',text:'원래 3인 심사여야 하는데, 왜 혼자 하셨어요?'},
      {type:'char',char:'teacherbad',text:'다른 선생님들 일정이 갑자기 겹쳤어. 어쩔 수 없었어.'},
      {type:'char',char:'jaei',text:'대회 전날 오비열 어머니가 면담 오셨잖아요. 선생님 차에 백화점 쇼핑백이 실린 것도 목격됐고요.'},
      {type:'narr',text:'선생님의 표정이 굳는다.'},
      {type:'char',char:'teacherbad',text:'…학부모 상담은 일상적인 거야. 쇼핑백은 개인 물건이고. 이건 네가 관여할 일이 아니야.'},
      {type:'char',char:'jaei',text:'선생님, 저는 기자로서 사실을 확인할 의무가 있어요. 학생들이 공정한 심사를 받을 권리도요.'},
      {type:'char',char:'teacherbad',text:'(자리에서 일어서며) 더 이상 대화 안 해. 나가.'},
    ],
    next:{type:'quiz',id:'q4'}
  },

  ch6a:{chapter:'6장 — 학생부 선생님',
    lines:[
      {type:'narr',text:'재이는 비열이, 소율이와 함께 학생부 김지연 선생님을 찾아간다.'},
      {type:'char',char:'teachergood',text:'무슨 일이에요? 셋이 같이 오다니.'},
      {type:'narr',text:'재이가 지금까지 모은 것들을 꺼낸다. 점수표 분석 자료, 목격자 진술 메모, 그리고 비열이의 증언.'},
      {type:'char',char:'biyeol',text:'선생님, 제가 직접 말씀드릴게요. 어머니가 최 선생님께 상품권을 드렸어요. 저는 대회 후에 알았는데, 사실을 말씀드리는 게 맞는 것 같아서요.'},
      {type:'char',char:'teachergood',text:'(진지하게 듣다가) 비열이, 용기 내줬어요. 쉽지 않은 결정이었을 텐데.'},
      {type:'char',char:'soyul',text:'저는 재심사를 원해요. 결과보다 공정한 과정이 더 중요하다고 생각해요.'},
      {type:'char',char:'teachergood',text:'알겠어요. 지금 상황은 공식 조사가 필요해요. 심사위원이 금품을 받고 점수를 조작했다면 이건 학교 내 비리예요.'},
      {type:'char',char:'jaei',text:'저희가 신고했다는 게 알려질까요?'},
      {type:'char',char:'teachergood',text:'공익신고자 보호 규정이 있어요. 걱정 말고 제게 맡겨요. 제가 직접 교장 선생님께 보고할게요.'},
    ],
    next:{type:'scene',id:'ch6_5'}
  },

  ch6_5:{chapter:'6장 — 민혁이와 함께',
    lines:[
      {type:'narr',text:'학생부 선생님께 신고하러 가기 전, 재이는 민혁이를 찾았다.'},
      {type:'char',char:'jaei',text:'민혁아, 나 지금 학생부 선생님한테 신고하러 가려고. 네가 목격한 것도 같이 말해줄 수 있어?'},
      {type:'char',char:'minhyuk',text:'내가 증언하면 어떻게 돼?'},
      {type:'char',char:'jaei',text:'재심사가 이루어질 수 있어. 공정하게 다시 심사받는 거야.'},

/* ===== DOM ===== */
var screen=document.getElementById('screen');
var clickArea=document.getElementById('click-area');
var choicesArea=document.getElementById('choices-area');
var miniArea=document.getElementById('mini-area');

function clearAreas(){
  choicesArea.innerHTML='';miniArea.innerHTML='';
  clickArea.style.display='block';
  clickArea.textContent='화면을 클릭해서 계속하기 ▶';
  clickArea.onclick=safeNextLine;
}
function setChapter(t){document.getElementById('chbadge').textContent=t;}

/* ===== 타이핑 효과 & 광클 방지 ===== */
var isTyping=false;
var typingAbort=null;

function setClickLock(locked){
  isTyping=locked;
  var btn=document.getElementById('click-area');
  if(!btn)return;
  if(locked){
    btn.style.opacity='0.55';
    btn.style.cursor='not-allowed';
  } else {
    btn.style.opacity='1';
    btn.style.cursor='pointer';
  }
}

function typeText(el,text,speed){
  setClickLock(true);
  var i=0;
  el.textContent='';
  typingAbort=function(){
    typingAbort=null;
    el.textContent=text;
    setClickLock(false);
  };
  function step(){
    if(typingAbort===null && el.textContent===text)return;
    if(i<text.length){
      el.textContent+=text[i++];
      screen.scrollTop=screen.scrollHeight;
      setTimeout(step,speed);
    } else {
      typingAbort=null;
      setClickLock(false);
    }
  }
  step();
}

function safeNextLine(){
  if(typingAbort){typingAbort();return;}
  nextLine();
}

function addLine(l){
  var el=document.createElement('div');el.className='line';
  if(l.type==='narr'){el.className+=' narr';
    var span=document.createElement('span');el.appendChild(span);
    screen.appendChild(el);screen.scrollTop=screen.scrollHeight;
    typeText(span,l.text,85);return;}
  else if(l.type==='narr-bold'){el.className+=' narr-bold';
    var span=document.createElement('span');el.appendChild(span);
    screen.appendChild(el);screen.scrollTop=screen.scrollHeight;
    typeText(span,l.text,85);return;}
  else{
    var c=CHARS[l.char];
    var row=document.createElement('div');row.className='row'+(c.side==='right'?' right':'');
    var av=document.createElement('div');av.className='avatar';av.innerHTML=SVG[l.char];
    var bwrap=document.createElement('div');bwrap.className='bubble-wrap';
    var nm=document.createElement('div');nm.className='char-name nm-'+c.cls;nm.textContent=c.name;
    var bbl=document.createElement('div');bbl.className='bubble bbl-'+c.cls;
    bwrap.appendChild(nm);bwrap.appendChild(bbl);
    row.appendChild(av);row.appendChild(bwrap);el.appendChild(row);
  }
  screen.appendChild(el);screen.scrollTop=screen.scrollHeight;
  typeText(bbl,'"'+l.text+'"',85);
}

function loadScene(id){
  currentScene=SCENES[id];lineIdx=0;
  clearAreas();setChapter(currentScene.chapter);nextLine();
}
function nextLine(){
  if(lineIdx<currentScene.lines.length){addLine(currentScene.lines[lineIdx]);lineIdx++;}
  else resolveNext(currentScene.next);
}
function resolveNext(next){
  if(!next)return;
  if(next.type==='scene')loadScene(next.id);
  else if(next.type==='quiz')showQuiz(next.id);
  else if(next.type==='choice')showChoices(next.id);
  else if(next.type==='mini')showMini(next.id);
  else if(next.type==='ending')showEnding(next.id);
  else if(next.type==='intro-chars')showCharIntro();
}

        popVerdict.style.cssText='display:block;font-size:14px;font-weight:700;padding:0.6rem 0.85rem;border-radius:10px;margin-top:8px;background:#fde8e8;color:#7a1a1a;border:1px solid #f0a0a0';
      }
    };
    rejectBtn.onclick=function(){
      if(!currentEv||evPicked[currentEv.id])return;
      if(!currentEv.real){
        evPicked[currentEv.id]=true;
        var rowEl=document.getElementById('evrow2-'+currentEv.id);
        if(rowEl)rowEl.style.opacity='0.5';
        var badge=document.getElementById('evbadge2-'+currentEv.id);
        if(badge){badge.textContent='기각';badge.style.cssText='font-size:12px;font-weight:700;color:#888;background:#f0f0f0;padding:2px 8px;border-radius:8px';}
        popVerdict.textContent=currentEv.verdict;
        popVerdict.style.cssText='display:block;font-size:14px;font-weight:700;padding:0.6rem 0.85rem;border-radius:10px;margin-top:8px;background:#f0f0f0;color:#555;border:1px solid #ccc';
        adoptBtn.disabled=true;rejectBtn.disabled=true;adoptBtn.style.opacity='0.5';rejectBtn.style.opacity='0.5';
      } else {
        popVerdict.textContent='⚠ 이건 중요한 증거예요! 다시 생각해보세요.';
        popVerdict.style.cssText='display:block;font-size:14px;font-weight:700;padding:0.6rem 0.85rem;border-radius:10px;margin-top:8px;background:#fde8e8;color:#7a1a1a;border:1px solid #f0a0a0';
      }
    };
    data.forEach(function(e){
      var row=document.createElement('div');row.id='evrow2-'+e.id;
      row.style.cssText='background:#fffbf0;border:1.5px solid #f0d080;border-radius:12px;padding:0.75rem 1rem;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:all 0.15s';
      var left=document.createElement('div');left.style.cssText='display:flex;align-items:center;gap:10px';
      var ico=document.createElement('span');ico.style.fontSize='22px';ico.textContent=e.icon;
      var nm=document.createElement('span');nm.style.cssText='font-size:14px;font-weight:600;color:#5a3a10';nm.textContent=e.name;
      left.appendChild(ico);left.appendChild(nm);
      var badge=document.createElement('span');badge.id='evbadge2-'+e.id;
      badge.style.cssText='font-size:12px;font-weight:700;color:#8a5a00;background:#fff0b0;padding:2px 8px;border-radius:8px';
      badge.textContent='내용 확인 ▶';
      row.appendChild(left);row.appendChild(badge);
      row.onclick=function(){openDetail(e);};
      listWrap.appendChild(row);
    });
    wrap.appendChild(tag);wrap.appendChild(desc);wrap.appendChild(counter);wrap.appendChild(listWrap);wrap.appendChild(popup);wrap.appendChild(okMsg);
    miniArea.appendChild(wrap);
  }

  /* ── 2. 목격자 인터뷰 ── */
  else if(id==='interview'){
    interviewDone=0;
    var witnesses=[
      {
        key:'student1',name:'정다은',hint:'방송부 · 대회 당일 무대 설치 도움',
        q:'정다은에게 어떻게 물어볼까요?',
        opts:[
          {text:'A "대회 당일 이상한 점 없었어?"',good:true,result:'다은: "어… 최 선생님이 대회 시작 전에 오비열 어머니랑 오래 이야기하는 거 봤어. 그리고 어머니가 종이백을 드리고 가셨어. 뭔지는 모르겠는데."'},
          {text:'B "비열이 공연 어떻게 생각했어?"',good:false,result:'다은: "열심히 하긴 했는데… 소율이가 더 잘했던 것 같긴 해. 근데 결과는 결과니까." (중요한 정보를 얻지 못했다)'}
        ]
      },
      {
        key:'student2',name:'박현우',hint:'3반 · 대회 전날 남아서 청소했음',
        q:'박현우에게 어떻게 물어볼까요?',
        opts:[
          {text:'A "대회 전날 학교에서 뭔가 봤어?"',good:true,result:'현우: "어, 나 청소 당번이라 늦게까지 있었는데. 최 선생님 차에 오비열 어머니가 백화점 쇼핑백 싣는 거 봤어. 좀 이상하다고 생각했는데 그냥 넘어갔어."'},
          {text:'B "최 선생님 좋아해?"',good:false,result:'현우: "그냥 평범한 선생님이죠 뭐. 딱히 좋고 싫고 없어요." (정보를 얻지 못했다)'}
        ]
      },
      {
        key:'student3',name:'윤세진',hint:'3학년 · 작년 대회 참가자',
        q:'윤세진 선배에게 어떻게 물어볼까요?',
        opts:[
          {text:'A "작년 대회 심사 방식이 어땠어요?"',good:true,result:'세진: "작년엔 심사위원이 세 분이었고 공개 채점이었어. 근데 올해 최 선생님 혼자 하셨다고? 그건 이상하다. 규정상 3인 이상이어야 하는데."'},
          {text:'B "올해 대회 결과 어떻게 생각해요?"',good:false,result:'세진: "저는 올해 참가 안 해서 잘 모르겠어요. 결과가 좀 의외긴 하다고 들었는데." (구체적 정보를 얻지 못했다)'}
        ]
      }
    ];

    var wrap=document.createElement('div');wrap.className='interview-wrap';
    var tag=document.createElement('div');tag.className='mini-tag mini-tag-purple';tag.textContent='🗣 목격자 인터뷰 미션';
    var desc=document.createElement('div');desc.className='mini-desc';desc.style.color='#4a3070';
    desc.textContent='3명의 목격자를 인터뷰해야 해요. 어떻게 질문하느냐에 따라 얻는 정보가 달라져요! 핵심 정보를 얻는 질문을 골라보세요.';
    var progress=document.createElement('div');progress.className='interview-progress';
    progress.textContent='인터뷰 완료: 0 / 3';

    var ibox=document.createElement('div');ibox.className='interview-box';
    var iq=document.createElement('div');iq.className='interview-q';
    var iopts=document.createElement('div');iopts.className='interview-opts';
    var ires=document.createElement('div');ires.className='interview-result';
    ibox.appendChild(iq);ibox.appendChild(iopts);ibox.appendChild(ires);

    var wlist=document.createElement('div');wlist.className='witness-list';

    witnesses.forEach(function(w){
      var row=document.createElement('div');row.className='witness-row';row.id='wrow-'+w.key;
      var av=document.createElement('div');av.className='witness-av';av.innerHTML=SVG[w.key];
      var info=document.createElement('div');
      var nm=document.createElement('div');nm.className='witness-name';nm.textContent=w.name;
      var hint=document.createElement('div');hint.className='witness-hint';hint.textContent=w.hint;
      info.appendChild(nm);info.appendChild(hint);
      var badge=document.createElement('span');badge.className='witness-badge badge-new';badge.textContent='인터뷰 ▶';badge.id='wbadge-'+w.key;
      row.appendChild(av);row.appendChild(info);row.appendChild(badge);

      row.onclick=function(){
        var doneRow=document.getElementById('wrow-'+w.key);
        if(doneRow.classList.contains('done'))return;
        iq.textContent=w.q;
        iopts.innerHTML='';ires.style.display='none';
        w.opts.forEach(function(opt){
          var obtn=document.createElement('button');obtn.className='interview-btn';obtn.textContent=opt.text;
          obtn.onclick=function(){
            iopts.querySelectorAll('.interview-btn').forEach(function(b){b.disabled=true;});
            ires.textContent=opt.result;
            ires.className='interview-result '+(opt.good?'ir-good':'ir-bad');
            ires.style.display='block';
            if(opt.good){
              interviewDone++;
              progress.textContent='인터뷰 완료: '+interviewDone+' / 3';
              doneRow.classList.add('done');
              var b=document.getElementById('wbadge-'+w.key);
              if(b){b.textContent='완료 ✓';b.className='witness-badge badge-done';}
              if(interviewDone>=3){
                var nextBtn=document.createElement('button');
                nextBtn.className='restart-btn';
                nextBtn.style.marginTop='12px';
                nextBtn.textContent='단서를 모두 모았다 — 다음으로 ▶';
                nextBtn.onclick=function(){miniArea.innerHTML='';resolveNext({type:'scene',id:'ch4'});};
                wrap.appendChild(nextBtn);
                setTimeout(function(){nextBtn.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
              }
            }
          };
          iopts.appendChild(obtn);
        });
        ibox.style.display='block';
        setTimeout(function(){ibox.scrollIntoView({behavior:'smooth',block:'nearest'});},100);
      };
      wlist.appendChild(row);
    });

    wrap.appendChild(tag);wrap.appendChild(desc);wrap.appendChild(progress);wrap.appendChild(wlist);wrap.appendChild(ibox);
    miniArea.appendChild(wrap);
  }


  /* ── 3. 진술 분석 ── */
  else if(id==='stmt'){
    stmtDone=0;
    var wrap=document.createElement('div');wrap.className='stmt-wrap';
    var tag=document.createElement('div');tag.className='stmt-tag';tag.textContent='진술 분석 미션';
    var desc=document.createElement('div');desc.className='stmt-desc';
    desc.textContent='각 인물의 진술이 사실인지 거짓인지 판단해보세요. 4개 모두 맞혀야 다음으로 진행해요.';
    wrap.appendChild(tag);wrap.appendChild(desc);
    STMTS.forEach(function(s){
      var card=document.createElement('div');card.className='stmt-card';
      var who=document.createElement('div');who.className='stmt-who';who.textContent=s.who;
      var txt=document.createElement('div');txt.className='stmt-text';txt.textContent=s.text;
      var btns=document.createElement('div');btns.className='stmt-btns';
      var badge=document.createElement('span');badge.className='stmt-badge badge-unk';badge.textContent='?';
      var fb=document.createElement('div');fb.className='stmt-fb';fb.textContent=s.fb;
      ['사실','거짓'].forEach(function(label){
        var btn=document.createElement('button');btn.className='stmt-btn';btn.textContent=label;
        btn.onclick=function(){
          if(badge.textContent!=='?')return;
          var ans=label==='사실'?'truth':'lie';
          if(ans===s.ans){
            stmtDone++;
            badge.textContent=label;badge.className='stmt-badge '+(ans==='truth'?'badge-truth':'badge-lie');
            fb.style.display='block';
            if(stmtDone>=4){setTimeout(function(){miniArea.innerHTML='';resolveNext({type:'scene',id:'ch9'});},700);}
          } else {
            var tmp=document.createElement('div');tmp.className='q-wrong';tmp.style.cssText='font-size:12px;margin-top:6px';tmp.textContent='틀렸어요. 다시 생각해보세요.';
            card.appendChild(tmp);
            setTimeout(function(){if(tmp.parentNode)tmp.parentNode.removeChild(tmp);},1000);
          }
        };
        btns.appendChild(btn);
      });
      btns.appendChild(badge);
      card.appendChild(who);card.appendChild(txt);card.appendChild(btns);card.appendChild(fb);
      wrap.appendChild(card);
    });
    miniArea.appendChild(wrap);
  }
}

/* ===== 엔딩 ===== */
function showEnding(id){
  clickArea.style.display='none';
  var msgs={
    a:['정의 실현!','공정한 무대가 돌아왔습니다'],
    b:['절반의 성공','조금 더 용기를 냈다면 어땠을까요?'],
    c:['침묵의 결과','다시 도전해보세요']
  };
  var m=msgs[id];
  var scoreBox=document.createElement('div');scoreBox.className='score-box';
  scoreBox.innerHTML='<div><div class="score-num">'+score+'</div><div class="score-label">/ 6 점수</div></div><div><div class="score-msg">'+m[0]+'</div><div class="score-sub">'+m[1]+'</div></div>';

  var endings={
    a:{
      title:'엔딩 A — 정의 실현 ★★★',cls:'end-a',
      body:'재심사 결과, 한소율이 정당한 1등이 됐다. 최민수 선생님은 직위해제 처리됐고, 오비열 어머니는 학교에 공식 사과문을 제출했다.\n\n학교는 앞으로 모든 교내 대회에 외부 심사위원을 포함한 3인 이상 심사를 의무화했다. 심사 기준과 결과도 전교생에게 공개하기로 했다.\n\n재심사에서 민혁이는 3등을 차지했다. 시상식에서 민혁이가 상을 받을 때, 관중석에서 작은 박수 소리가 들렸다. 오태양이었다.\n\n재이의 기사는 학교 신문 역대 최다 조회수를 기록했다. 제목은 이랬다.\n\n"공정한 무대 — 모두가 같은 출발선에 설 권리"',
      lesson:'청탁과 특혜는 공정한 경쟁을 무너뜨립니다. 심사위원에 대한 금품 제공은 뇌물이자 청탁이며, "작은 감사"라도 예외가 없어요. 공익신고자는 법으로 보호받습니다.'
    },
    b:{
      title:'엔딩 B — 절반의 성공 ★★',cls:'end-b',
      body:'익명 제보로 조사가 시작됐지만, 직접 증언해줄 사람이 없어 재심사는 이루어지지 않았다. 최 선생님은 "주의" 처분만 받았다.\n\n하지만 학교는 제도를 바꿨다. 앞으로 모든 교내 대회는 3인 이상 심사를 의무화한다는 공지가 올라왔다.\n\n소율이가 말했다. "재심사는 못 받았지만, 그래도 뭔가 바뀌긴 했네."\n\n완전한 정의는 아니었지만, 작은 변화는 시작됐다.',
      lesson:'익명 신고는 중요한 첫걸음이지만, 증거와 증인이 함께할 때 더 강력한 변화를 만듭니다. 엔딩 A에 도전해보세요!'
    },
    c:{
      title:'엔딩 C — 침묵의 대가 ★',cls:'end-c',
      body:'재이는 아무것도 하지 않았다. 무서웠고, 복잡했고, 어디서부터 시작해야 할지 몰랐다.\n\n비열이는 공식 1등으로 무대에 올랐다. 소율이는 관중석에 앉아 아무 말 없이 공연을 봤다.\n\n"재이야, 그냥 넘어가는 거야?"\n"…미안, 소율아. 내가 너무 겁쟁이였어."\n\n다음 학기에도 같은 루머가 돌았다. 아무도 나서지 않으면 불공정은 관행이 된다.',
      lesson:'불공정을 보고도 침묵하는 것은 소극적 동조입니다. 두렵더라도 올바른 방법으로 목소리를 내는 것이 공동체의 공정성을 지킵니다. 엔딩 A에 도전해보세요!'
    }
  };

  var e=endings[id];
  var box=document.createElement('div');box.className='ending-box '+e.cls;
  var title=document.createElement('div');title.className='end-title';title.textContent=e.title;
  var body=document.createElement('div');body.className='end-body';body.textContent=e.body;
  var lesson=document.createElement('div');lesson.className='lesson';
  lesson.innerHTML='<span class="lesson-label">청렴 포인트</span>'+e.lesson;
  box.appendChild(title);box.appendChild(body);box.appendChild(lesson);

  var btn=document.createElement('button');btn.className='restart-btn';btn.textContent='처음부터 다시 하기';
  btn.onclick=restart;

  var cpSummary=document.createElement('div');cpSummary.className='cheong-summary';
  var cpTitle=document.createElement('div');cpTitle.className='cheong-summary-title';cpTitle.textContent='📋 이번 게임의 청렴 포인트';
  cpSummary.appendChild(cpTitle);
  CHEONG_POINTS.forEach(function(pt,i){
    var card=document.createElement('div');card.className='cheong-card';
    card.innerHTML='<span class="cheong-card-num">'+(i+1)+'.</span>'+pt;
    cpSummary.appendChild(card);
  });
  var actionBtns=document.createElement('div');actionBtns.className='action-btns';
  if(id!=='a'){
    var backBtn=document.createElement('button');backBtn.className='back-btn';
    backBtn.textContent='↩ 이전 선택지로 돌아가기';
    backBtn.onclick=function(){
      screen.innerHTML='';miniArea.innerHTML='';choicesArea.innerHTML='';
      clearAreas();
      var backId=BACK_CHOICE[id]||null;
      if(backId)showChoices(backId);
    };
    actionBtns.appendChild(backBtn);
  }
  actionBtns.appendChild(btn);
  miniArea.appendChild(scoreBox);miniArea.appendChild(box);miniArea.appendChild(cpSummary);miniArea.appendChild(actionBtns);
}

/* ===== 재시작 ===== */
function restart(){
  score=0;stmtDone=0;interviewDone=0;spotFound=0;
  screen.innerHTML='';clearAreas();loadScene('intro');
}

loadScene('intro');
</script>
